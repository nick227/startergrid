openapi: 3.0.3
info:
  title: Dealer Marketplace API
  version: 1.0.0
  description: |
    Consumer vehicle browse and auth API.

    ## Auth

    Consumer login issues an `mp_session` HttpOnly cookie (30-day lifetime).
    Authenticated endpoints require this cookie.
    The operator `op_session` cookie is never accepted here.

    ## Boundary contract

    This spec is intentionally separate from openapi/openapi.yaml (the operator API).
    No operator-internal fields appear in card/list schemas here:
      - No VIN on browse cards (detail exposes full VIN in vehicle.core by policy)
      - No platform account state or sync queue data
      - No performance cache fields (operator analytics)
      - No billing, subscription, or credential data
      - No readiness runs, sync events, or proof artifacts
      - No raw lead data

    `listingId` is an opaque stable identifier for the detail route. It is not a VIN.

servers:
  - url: /
    description: Same-origin

tags:
  - name: Marketplace
    description: Public consumer vehicle browse
  - name: MarketplaceAuth
    description: Consumer authentication (mp_session cookie)

paths:
  /api/marketplace/auth/register:
    post:
      tags: [MarketplaceAuth]
      security: []
      x-route-classification: public
      operationId: marketplaceRegister
      summary: Consumer registration
      description: |
        Creates a new consumer account, returns a safe consumer identity, and sets an
        `mp_session` HttpOnly cookie (30 days). Duplicate email returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketplaceRegisterRequest'
      responses:
        '200':
          description: Registration successful
          headers:
            Set-Cookie:
              description: mp_session HttpOnly cookie (30-day lifetime)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceUserIdentity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceErrorResponse'

  /api/marketplace/auth/login:
    post:
      tags: [MarketplaceAuth]
      security: []
      x-route-classification: public
      operationId: marketplaceLogin
      summary: Consumer login
      description: |
        Accepts email + password. Returns a safe consumer identity and sets an
        `mp_session` HttpOnly cookie (30 days). Unknown email and wrong password
        return the same 401 to prevent email enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketplaceLoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: mp_session HttpOnly cookie (30-day lifetime)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceUserIdentity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/marketplace/auth/logout:
    post:
      tags: [MarketplaceAuth]
      security: []
      x-route-classification: public
      operationId: marketplaceLogout
      summary: Consumer logout
      description: |
        Revokes the current mp_session if present and clears the cookie.
        Always returns 200 — safe to call unconditionally.
      responses:
        '200':
          description: Logged out
          headers:
            Set-Cookie:
              description: mp_session cookie cleared (Max-Age=0)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceLogoutResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/marketplace/auth/me:
    get:
      tags: [MarketplaceAuth]
      security:
        - MarketplaceCookieAuth: []
      x-route-classification: marketplace-auth
      operationId: getMarketplaceMe
      summary: Get current consumer identity
      description: |
        Returns the authenticated consumer's identity from a valid mp_session cookie.
        Returns 401 when the cookie is missing, invalid, revoked, expired, or the
        account is inactive.
      responses:
        '200':
          description: Authenticated consumer identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceUserIdentity'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/marketplace/me/favorites:
    get:
      tags: [MarketplaceAuth]
      security:
        - MarketplaceCookieAuth: []
      x-route-classification: marketplace-auth
      operationId: getMarketplaceFavorites
      summary: List saved favorites
      description: |
        Returns marketplace-safe vehicle cards for all currently-eligible favorited listings
        in the requested business category.
        Sold, removed, or unpriced vehicles are silently omitted from this response.
        The underlying favorite record is preserved — cards reappear if the vehicle is re-listed.
      parameters:
        - name: category
          in: query
          description: Business category slug or enum. Defaults to AUTOMOTIVE.
          schema:
            $ref: '#/components/schemas/MarketplaceBusinessCategory'
      responses:
        '200':
          description: Favorites list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceFavoritesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/marketplace/me/favorites/{listingId}:
    post:
      tags: [MarketplaceAuth]
      security:
        - MarketplaceCookieAuth: []
      x-route-classification: marketplace-auth
      operationId: addMarketplaceFavorite
      summary: Save a listing to favorites
      description: |
        Idempotent add. Saving an already-saved listing is a no-op.
        Returns 404 when the listing does not exist or is not marketplace-eligible
        (sold, removed, or unpriced).
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: query
          description: Business category slug or enum. Defaults to AUTOMOTIVE.
          schema:
            $ref: '#/components/schemas/MarketplaceBusinessCategory'
      responses:
        '200':
          description: Favorite saved (or already saved)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceFavoriteAddResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [MarketplaceAuth]
      security:
        - MarketplaceCookieAuth: []
      x-route-classification: marketplace-auth
      operationId: removeMarketplaceFavorite
      summary: Remove a listing from favorites
      description: |
        Idempotent remove. Always returns 200 — safe to call even when the listing
        was never favorited.
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Favorite removed (or was not present)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceFavoriteRemoveResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/marketplace/sites:
    get:
      tags: [Marketplace]
      security: []
      x-route-classification: public
      operationId: listMarketplaceSites
      summary: List consumer marketplace sites
      description: |
        Returns every business-category marketplace surface exposed to shoppers,
        with listing counts and site status (active, coming_soon, disabled).
      responses:
        '200':
          description: Marketplace site index
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceSitesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/marketplace/feed:
    get:
      tags: [Marketplace]
      security: []
      x-route-classification: public
      operationId: getMarketplaceFeed
      summary: Browse the mixed marketplace feed
      description: |
        Returns a cursor-based mixed feed for the consumer marketplace.
        Vehicle items use marketplace eligibility rules. Promo and notice items
        are inserted server-side and do not affect cursor semantics.
      parameters:
        - name: category
          in: query
          description: Business category slug or enum. Defaults to AUTOMOTIVE.
          schema:
            $ref: '#/components/schemas/MarketplaceBusinessCategory'
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 24
        - name: make
          in: query
          schema:
            type: string
            maxLength: 80
        - name: sellerName
          in: query
          description: |
            Seller-name text filter (property manager, broker, host, etc.).
            Only applied for categories whose schema declares marketplaceFilter seller.
            Ignored for automotive and other brand-filter categories.
          schema:
            type: string
            maxLength: 80
        - name: model
          in: query
          schema:
            type: string
            maxLength: 80
        - name: condition
          in: query
          schema:
            type: string
            enum: [NEW, USED, CPO]
        - name: minPrice
          in: query
          description: Minimum priceCents (inclusive)
          schema:
            type: integer
            minimum: 0
        - name: maxPrice
          in: query
          description: Maximum priceCents (inclusive)
          schema:
            type: integer
            minimum: 0
        - name: maxMileage
          in: query
          description: Maximum mileage (inclusive). Omit to include all mileages.
          schema:
            type: integer
            minimum: 0
        - name: minYear
          in: query
          description: Minimum model year (inclusive).
          schema:
            type: integer
            minimum: 1900
        - name: maxYear
          in: query
          description: Maximum model year (inclusive).
          schema:
            type: integer
            minimum: 1900
        - name: sortBy
          in: query
          description: Sort order for results. Defaults to newest. Use relevance when q is set for best-match ordering.
          schema:
            type: string
            enum: [newest, price-asc, price-desc, mileage-asc, year-asc, year-desc, relevance]
        - name: dealer
          in: query
          description: Filter by dealer ID
          schema:
            type: string
        - name: q
          in: query
          description: Keyword search across make, model, and trim.
          schema:
            type: string
            maxLength: 120
        - name: facets
          in: query
          description: |
            Comma-separated schema-backed facet filters encoded as fieldKey:value.
            Only enum/boolean facets declared for the active category are applied.
          schema:
            type: string
            maxLength: 500
        - name: buyerLat
          in: query
          description: Buyer latitude for nearby radius filtering. Never echoed in responses.
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
        - name: buyerLng
          in: query
          description: Buyer longitude for nearby radius filtering. Never echoed in responses.
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
        - name: radiusMiles
          in: query
          description: Search radius in miles when buyerLat and buyerLng are set. Clamped to 1–500; defaults to 50.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: nationwide
          in: query
          description: When true, ignore buyer location and return nationwide results.
          schema:
            type: boolean
            default: true
        - name: availability
          in: query
          description: Availability filter. MVP supports available-only (not sold or removed).
          schema:
            type: string
            enum: [available]
            default: available
      responses:
        '200':
          description: Mixed marketplace feed page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceFeedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/marketplace/facets:
    get:
      tags: [Marketplace]
      security: []
      x-route-classification: public
      operationId: getMarketplaceFacets
      summary: Get dynamic marketplace filter facets
      description: |
        Returns filter facets (dropdown options and counts) based on current 
        published marketplace inventory for the active filters.
      parameters:
        - name: category
          in: query
          description: Business category slug or enum. Defaults to AUTOMOTIVE.
          schema:
            $ref: '#/components/schemas/MarketplaceBusinessCategory'
        - name: make
          in: query
          schema:
            type: string
            maxLength: 80
        - name: sellerName
          in: query
          description: |
            Seller-name text filter (property manager, broker, host, etc.).
            Only applied for categories whose schema declares marketplaceFilter seller.
            Ignored for automotive and other brand-filter categories.
          schema:
            type: string
            maxLength: 80
        - name: model
          in: query
          schema:
            type: string
            maxLength: 80
        - name: condition
          in: query
          schema:
            type: string
            enum: [NEW, USED, CPO]
        - name: minPrice
          in: query
          description: Minimum priceCents (inclusive)
          schema:
            type: integer
            minimum: 0
        - name: maxPrice
          in: query
          description: Maximum priceCents (inclusive)
          schema:
            type: integer
            minimum: 0
        - name: maxMileage
          in: query
          description: Maximum mileage (inclusive). Omit to include all mileages.
          schema:
            type: integer
            minimum: 0
        - name: minYear
          in: query
          description: Minimum model year (inclusive).
          schema:
            type: integer
            minimum: 1900
        - name: maxYear
          in: query
          description: Maximum model year (inclusive).
          schema:
            type: integer
            minimum: 1900
        - name: dealer
          in: query
          description: Filter by dealer ID
          schema:
            type: string
        - name: q
          in: query
          description: Keyword search across make, model, and trim.
          schema:
            type: string
            maxLength: 120
        - name: facets
          in: query
          description: |
            Comma-separated schema-backed facet filters encoded as fieldKey:value.
            Only enum/boolean facets declared for the active category are applied.
          schema:
            type: string
            maxLength: 500
        - name: buyerLat
          in: query
          description: Buyer latitude for nearby radius filtering. Never echoed in responses.
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
        - name: buyerLng
          in: query
          description: Buyer longitude for nearby radius filtering. Never echoed in responses.
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
        - name: radiusMiles
          in: query
          description: Search radius in miles when buyerLat and buyerLng are set. Clamped to 1–500; defaults to 50.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: nationwide
          in: query
          description: When true, ignore buyer location and return nationwide results.
          schema:
            type: boolean
            default: true
        - name: availability
          in: query
          description: Availability filter. MVP supports available-only (not sold or removed).
          schema:
            type: string
            enum: [available]
            default: available
      responses:
        '200':
          description: Filter facets based on current inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceFacetsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/marketplace/vehicles:
    get:
      tags: [Marketplace]
      security: []
      x-route-classification: public
      operationId: listMarketplaceVehicles
      summary: Browse marketplace-eligible vehicles
      description: |
        Returns paginated, cross-dealer vehicle cards for marketplace-eligible inventory.
        Eligible = active (not sold/removed) + price set.
        Supports make/model/condition/price/dealer filters.
      parameters:
        - name: category
          in: query
          description: Business category slug or enum. Defaults to AUTOMOTIVE.
          schema:
            $ref: '#/components/schemas/MarketplaceBusinessCategory'
        - name: make
          in: query
          schema:
            type: string
            maxLength: 80
        - name: sellerName
          in: query
          description: |
            Seller-name text filter (property manager, broker, host, etc.).
            Only applied for categories whose schema declares marketplaceFilter seller.
            Ignored for automotive and other brand-filter categories.
          schema:
            type: string
            maxLength: 80
        - name: model
          in: query
          schema:
            type: string
            maxLength: 80
        - name: condition
          in: query
          schema:
            type: string
            enum: [NEW, USED, CPO]
        - name: minPrice
          in: query
          description: Minimum priceCents (inclusive)
          schema:
            type: integer
            minimum: 0
        - name: maxPrice
          in: query
          description: Maximum priceCents (inclusive)
          schema:
            type: integer
            minimum: 0
        - name: maxMileage
          in: query
          description: Maximum mileage (inclusive). Omit to include all mileages.
          schema:
            type: integer
            minimum: 0
        - name: minYear
          in: query
          description: Minimum model year (inclusive).
          schema:
            type: integer
            minimum: 1900
        - name: maxYear
          in: query
          description: Maximum model year (inclusive).
          schema:
            type: integer
            minimum: 1900
        - name: sortBy
          in: query
          description: Sort order for results. Defaults to newest. Use relevance when q is set for best-match ordering.
          schema:
            type: string
            enum: [newest, price-asc, price-desc, mileage-asc, year-asc, year-desc, relevance]
        - name: dealer
          in: query
          description: Filter by dealer ID
          schema:
            type: string
        - name: q
          in: query
          description: Keyword search across make, model, and trim.
          schema:
            type: string
            maxLength: 120
        - name: facets
          in: query
          description: |
            Comma-separated schema-backed facet filters encoded as fieldKey:value.
            Only enum/boolean facets declared for the active category are applied.
          schema:
            type: string
            maxLength: 500
        - name: availability
          in: query
          description: Availability filter. MVP supports available-only (not sold or removed).
          schema:
            type: string
            enum: [available]
            default: available
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 24
        - name: buyerLat
          in: query
          description: Buyer latitude for nearby radius filtering. Never echoed in responses.
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
        - name: buyerLng
          in: query
          description: Buyer longitude for nearby radius filtering. Never echoed in responses.
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
        - name: radiusMiles
          in: query
          description: Search radius in miles when buyerLat and buyerLng are set. Clamped to 1–500; defaults to 50.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: nationwide
          in: query
          description: When true, ignore buyer location and return nationwide results.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Vehicle listing page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceVehicleListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/marketplace/vehicles/{listingId}:
    get:
      tags: [Marketplace]
      security: []
      x-route-classification: public
      operationId: getMarketplaceVehicle
      summary: Single vehicle detail
      description: |
        Returns detail for one marketplace-eligible vehicle by opaque listing ID.
        Returns 404 for sold, removed, non-existent, or wrong-category vehicles.
      parameters:
        - name: listingId
          in: path
          required: true
          description: Opaque vehicle identifier from MarketplaceVehicleCard.listingId
          schema:
            type: string
        - name: category
          in: query
          description: Business category slug or enum. Defaults to AUTOMOTIVE.
          schema:
            $ref: '#/components/schemas/MarketplaceBusinessCategory'
      responses:
        '200':
          description: Vehicle detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceVehicleDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/marketplace/vehicles/{listingId}/leads:
    post:
      tags: [Marketplace]
      security: []
      x-route-classification: public-write
      operationId: captureMarketplaceLead
      summary: Submit a vehicle inquiry
      description: |
        Public lead capture for one marketplace-eligible vehicle.
        Accepts basic contact fields only — no buyer accounts required.
        Returns 404 when the listing is sold, removed, or not found.
        Does not expose raw lead data on any GET endpoint.
      parameters:
        - name: listingId
          in: path
          required: true
          description: Opaque vehicle identifier from MarketplaceVehicleCard.listingId
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketplaceLeadCaptureRequest'
      responses:
        '201':
          description: Inquiry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceLeadCaptureResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceErrorResponse'

  /api/marketplace/vehicles/{listingId}/report:
    post:
      tags: [Marketplace]
      security: []
      x-route-classification: public-write
      operationId: reportMarketplaceListing
      summary: Report a marketplace listing
      description: |
        Public trust signal — allows shoppers to flag a listing for review.
        Rate-limited to 5 reports per IP per 5 minutes per listing.
        Returns 404 when the listing is sold, removed, or not found.
      parameters:
        - name: listingId
          in: path
          required: true
          description: Opaque vehicle identifier from MarketplaceVehicleCard.listingId
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketplaceListingReportRequest'
      responses:
        '201':
          description: Report accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceListingReportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceErrorResponse'

  /api/marketplace/events:
    post:
      tags: [Marketplace]
      security: []
      x-route-classification: public-write
      operationId: captureMarketplaceChannelEvent
      summary: Record a first-party marketplace engagement event
      description: |
        Captures observed_first_party channel events for consumer-marketplace.
        Does not return analytics. GET marketplace endpoints remain analytics-free.
        Rate-limited public write.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketplaceChannelEventRequest'
      responses:
        '202':
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceChannelEventResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceErrorResponse'

  /api/marketplace/sellers/{sellerId}:
    get:
      tags: [Marketplace]
      security: []
      x-route-classification: public
      operationId: getMarketplaceSellerIndex
      summary: Seller storefront index
      description: |
        Returns seller info and all marketplace-eligible listings for that seller
        within the requested business category.
        Returns 404 when the seller does not exist or belongs to another category.
      parameters:
        - name: sellerId
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: query
          description: Business category slug or enum. Defaults to AUTOMOTIVE.
          schema:
            $ref: '#/components/schemas/MarketplaceBusinessCategory'
      responses:
        '200':
          description: Seller storefront
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceDealerIndexResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/marketplace/dealers/{dealerId}:
    get:
      tags: [Marketplace]
      security: []
      x-route-classification: public
      operationId: getMarketplaceDealerIndex
      summary: Dealer storefront index (legacy alias)
      description: |
        Legacy alias for GET /api/marketplace/sellers/{sellerId}.
        Returns dealer info and all marketplace-eligible vehicles for that dealer.
        Returns 404 when the dealer does not exist or belongs to another category.
      parameters:
        - name: dealerId
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: query
          description: Business category slug or enum. Defaults to AUTOMOTIVE.
          schema:
            $ref: '#/components/schemas/MarketplaceBusinessCategory'
      responses:
        '200':
          description: Dealer index
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceDealerIndexResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/marketplace/dealers/{dealerId}/stats:
    get:
      tags: [Marketplace]
      security: []
      x-route-classification: public
      operationId: getMarketplaceDealerStats
      summary: First-party channel engagement stats for a dealer
      description: |
        Returns aggregated consumer-marketplace engagement counts for one dealer.
        All values are totals — no individual visitor data is exposed.
        Returns 404 when the dealer does not exist.
      parameters:
        - name: dealerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dealer engagement stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceDealerStatsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/marketplace/category-items:
    get:
      tags: [Marketplace]
      security: []
      x-route-classification: public
      operationId: listMarketplaceCategoryItems
      summary: Browse category inventory items (e-books and other digital categories)
      description: |
        Returns paginated marketplace-eligible category inventory items.
        Supports filtering by categoryId, dealer, page, and pageSize.
        Items must be READY with an active consumer-marketplace listing and a price set.
      parameters:
        - name: categoryId
          in: query
          description: Business category ID (e.g. EBOOKS). Required.
          schema:
            type: string
        - name: dealer
          in: query
          description: Filter by dealer ID
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 24
      responses:
        '200':
          description: Category item listing page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceCategoryItemListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/marketplace/category-items/{listingId}:
    get:
      tags: [Marketplace]
      security: []
      x-route-classification: public
      operationId: getMarketplaceCategoryItem
      summary: Single category item detail
      description: |
        Returns detail for one marketplace-eligible category inventory item by listing ID.
        Returns 404 for sold, removed, non-existent, or unpriced items.
      parameters:
        - name: listingId
          in: path
          required: true
          description: Opaque listing identifier from MarketplaceCategoryItemCard.listingId
          schema:
            type: string
      responses:
        '200':
          description: Category item detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceCategoryItemDetail'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    MarketplaceCookieAuth:
      type: apiKey
      in: cookie
      name: mp_session
      description: Consumer session cookie set by POST /api/marketplace/auth/login

  responses:
    BadRequest:
      description: Bad request — invalid query parameter value
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MarketplaceErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MarketplaceErrorResponse'
    Unauthorized:
      description: Authentication required or session invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MarketplaceErrorResponse'

  schemas:
    MarketplaceBusinessCategory:
      type: string
      description: Business category enum value or kebab-case slug (e.g. vacation-rentals).
      enum:
        - AUTOMOTIVE
        - SONGS
        - EBOOKS
        - WATCHES
        - SNEAKERS
        - COLLECTIBLES
        - APPAREL
        - VACATION_RENTALS
        - APARTMENTS
        - HOMES
        - COMMERCIAL_PROPERTY
        - BOATS
        - TRAILERS_POWERSPORTS_RV
        - HEAVY_EQUIPMENT
        - FURNITURE
        - VIDEO_DISTRIBUTION
        - automotive
        - songs
        - ebooks
        - watches
        - sneakers
        - collectibles
        - apparel
        - vacation-rentals
        - apartments
        - homes
        - commercial-property
        - boats
        - trailers-powersports-rv
        - heavy-equipment
        - furniture
        - video-distribution

    MarketplaceSiteSummary:
      type: object
      required: [category, slug, label, status, listingCount, href, tagline]
      properties:
        category:
          type: string
        slug:
          type: string
        label:
          type: string
        status:
          type: string
          enum: [active, coming_soon, disabled]
        listingCount:
          type: integer
          minimum: 0
        href:
          type: string
        tagline:
          type: string

    MarketplaceSitesResponse:
      type: object
      required: [sites]
      properties:
        sites:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceSiteSummary'

    MarketplaceLoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128

    MarketplaceRegisterRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128
        displayName:
          type: string
          maxLength: 160

    MarketplaceUserIdentity:
      type: object
      description: Safe consumer identity — no passwordHash, no tokenHash, no operator fields.
      required: [id, email, displayName]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
          nullable: true

    MarketplaceFavoritesResponse:
      type: object
      required: [favorites, total, unavailableFavorites]
      properties:
        favorites:
          type: array
          description: |
            Marketplace-safe vehicle cards for currently-eligible favorited listings.
            Sold, removed, or unpriced vehicles are omitted. Their favorite record is
            preserved and will reappear if the vehicle becomes eligible again.
          items:
            $ref: '#/components/schemas/MarketplaceVehicleCard'
        total:
          type: integer
          minimum: 0
          description: Count of eligible favorited vehicles in this response.
        unavailableFavorites:
          type: array
          description: Stale favorites — saved listings that are no longer available.
          items:
            $ref: '#/components/schemas/MarketplaceUnavailableFavorite'

    MarketplaceUnavailableFavorite:
      type: object
      required: [listingId, title]
      properties:
        listingId:
          type: string
        title:
          type: string
          description: Formatted title (year make model) at time of last known state.

    MarketplaceFavoriteAddResponse:
      type: object
      required: [favorited, listingId]
      properties:
        favorited:
          type: boolean
        listingId:
          type: string

    MarketplaceFavoriteRemoveResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    MarketplaceLogoutResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    MarketplaceErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MarketplaceVehicleCard:
      type: object
      description: |
        Consumer-safe vehicle card. Contains no VIN, no operator-internal IDs,
        no sync state, no performance analytics, no account data.
      required:
        - listingId
        - stockNumber
        - year
        - make
        - model
        - trim
        - condition
        - priceCents
        - mileage
        - exteriorColor
        - mediaUrls
        - mediaItems
        - dealerId
        - dealerName
        - dealerCity
        - dealerState
        - listingUrl
        - listedAt
      properties:
        listingId:
          type: string
          description: Opaque stable identifier for the detail route. Not the vehicle VIN.
        stockNumber:
          type: string
        year:
          type: integer
          minimum: 1900
          maximum: 2100
        make:
          type: string
        model:
          type: string
        trim:
          type: string
          nullable: true
        condition:
          type: string
          enum: [NEW, USED, CPO]
        priceCents:
          type: integer
          minimum: 0
        originalPriceCents:
          type: integer
          nullable: true
          minimum: 0
          description: Previous price before a price drop. Null when no drop has occurred.
        mileage:
          type: integer
          minimum: 0
        usageUnit:
          type: string
          nullable: true
          enum: [miles, hours]
          description: Optional usage suffix for non-automotive inventory (defaults to miles when omitted).
        unitType:
          type: string
          nullable: true
          description: Vessel or unit type from categoryPayload (boats vesselType, trailers unitType).
        lengthFt:
          type: number
          nullable: true
          description: Length in feet when stored on categoryPayload.
        exteriorColor:
          type: string
          nullable: true
        mediaUrls:
          type: array
          maxItems: 8
          items:
            type: string
          description: >
            First 8 images ordered by sort sequence.
            Additional images available in the detail endpoint.
        mediaItems:
          type: array
          maxItems: 8
          items:
            $ref: '#/components/schemas/MarketplaceCardMediaItem'
          description: First 8 media items ordered by sort sequence.
        dealerId:
          type: string
        dealerName:
          type: string
          description: dbaName when available, otherwise legalName.
        dealerCity:
          type: string
          nullable: true
        dealerState:
          type: string
          nullable: true
        listingUrl:
          type: string
          description: Relative URL to the consumer listing page.
        listedAt:
          type: string
          format: date-time
          description: When the vehicle was first listed.
        availabilityStatus:
          type: string
          enum: [PENDING, SOLD]
          description: Omitted when the listing is available. Never faked on cards.
        distanceMiles:
          type: integer
          minimum: 0
          description: |
            Straight-line distance from the buyer location query params to the seller rooftop.
            Omitted when buyer coords or seller rooftopLat/rooftopLng are unavailable.
            Never faked as zero when distance cannot be computed.

    MarketplaceVehicleListResponse:
      type: object
      required: [vehicles, total, page, pageSize, nextPage]
      properties:
        vehicles:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceVehicleCard'
        total:
          type: integer
          minimum: 0
          description: Total eligible vehicles matching the filter (across all pages).
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        nextPage:
          type: string
          nullable: true
          description: Relative URL for the next page, or null on the last page.

    MarketplaceCardMediaItem:
      type: object
      description: Lean media item for browse cards (IMAGE and VIDEO only).
      required: [kind, url, width, height, mimeType, posterUrl]
      properties:
        kind:
          type: string
          enum: [IMAGE, VIDEO]
        url:
          type: string
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        mimeType:
          type: string
          nullable: true
        posterUrl:
          type: string
          nullable: true

    MarketplaceVehicleDetailResponse:
      type: object
      description: |
        Nested vehicle detail for the consumer VDP. promotion is required for
        platform/operator context; the default UI does not surface syndication
        channels to shoppers unless explicitly productized.
      required: [vehicle, promotion, ctas]
      properties:
        vehicle:
          $ref: '#/components/schemas/MarketplaceVehicleDetail'
        promotion:
          $ref: '#/components/schemas/MarketplaceListingPromotion'
        ctas:
          $ref: '#/components/schemas/MarketplaceVehicleCtas'

    MarketplaceVehicleDetail:
      type: object
      required:
        - core
        - commerce
        - location
        - classification
        - colors
        - engine
        - efficiency
        - conditionHistory
        - features
        - warranty
        - media
        - content
      properties:
        core:
          $ref: '#/components/schemas/VehicleCore'
        commerce:
          $ref: '#/components/schemas/VehicleCommerce'
        location:
          $ref: '#/components/schemas/VehicleLocation'
        classification:
          $ref: '#/components/schemas/VehicleClassification'
        colors:
          $ref: '#/components/schemas/VehicleColors'
        engine:
          $ref: '#/components/schemas/VehicleEngine'
        efficiency:
          $ref: '#/components/schemas/VehicleEfficiency'
        conditionHistory:
          $ref: '#/components/schemas/VehicleConditionHistory'
        features:
          $ref: '#/components/schemas/VehicleFeatures'
        warranty:
          $ref: '#/components/schemas/VehicleWarranty'
        media:
          $ref: '#/components/schemas/VehicleMedia'
        content:
          $ref: '#/components/schemas/VehicleContent'

    VehicleCore:
      type: object
      required: [listingId, stockNumber, vin, year, make, model, trim, condition, title]
      properties:
        listingId:
          type: string
        stockNumber:
          type: string
        vin:
          type: string
          description: Full VIN — public on detail by policy.
        year:
          type: integer
          minimum: 1900
          maximum: 2100
        make:
          type: string
        model:
          type: string
        trim:
          type: string
          nullable: true
        condition:
          type: string
          enum: [NEW, USED, CPO]
        title:
          type: string
          description: Platform-computed display title.

    VehicleCommerce:
      type: object
      required: [priceCents, availabilityStatus, listedAt]
      properties:
        priceCents:
          type: integer
          minimum: 0
        originalPriceCents:
          type: integer
          nullable: true
          minimum: 0
        priceLastChangedAt:
          type: string
          format: date-time
          nullable: true
        estimatedMonthlyPaymentCents:
          type: integer
          nullable: true
          minimum: 0
        availabilityStatus:
          type: string
          enum: [AVAILABLE, PENDING, SOLD]
        shippingPriceCents:
          type: integer
          nullable: true
          minimum: 0
        estimatedArrival:
          type: string
          nullable: true
        listedAt:
          type: string
          format: date-time

    VehicleLocation:
      type: object
      required: [dealerId, dealerName, dealerCity, dealerState, dealerZip, dealerPhone, dealerWebsiteUrl, dealerStoreName]
      properties:
        dealerId:
          type: string
        dealerName:
          type: string
        dealerStoreName:
          type: string
          nullable: true
        dealerCity:
          type: string
          nullable: true
        dealerState:
          type: string
          nullable: true
        dealerZip:
          type: string
          nullable: true
        dealerPhone:
          type: string
          nullable: true
        dealerWebsiteUrl:
          type: string
          nullable: true

    VehicleClassification:
      type: object
      required: [mileage, bodyStyle, vehicleType, vehicleSize, doorCount, seatCount, priorUse]
      properties:
        mileage:
          type: integer
          minimum: 0
        usageUnit:
          type: string
          nullable: true
          enum: [miles, hours]
        unitType:
          type: string
          nullable: true
          description: Optional unit subtype label (RV, ATV, vessel type, etc.).
        lengthFt:
          type: number
          nullable: true
          description: Vessel length in feet when provided in categoryPayload.
        engineHours:
          type: integer
          nullable: true
          minimum: 0
          description: Engine hours when distinct from listing usage hours.
        bodyStyle:
          type: string
          nullable: true
        vehicleType:
          type: string
          nullable: true
        vehicleSize:
          type: string
          nullable: true
        doorCount:
          type: integer
          nullable: true
        seatCount:
          type: integer
          nullable: true
        priorUse:
          type: string
          nullable: true

    VehicleColors:
      type: object
      required: [exteriorColor, interiorColor, upholsteryMaterial]
      properties:
        exteriorColor:
          type: string
          nullable: true
        interiorColor:
          type: string
          nullable: true
        upholsteryMaterial:
          type: string
          nullable: true

    VehicleEngine:
      type: object
      required: [engineSize, engineType, fuelType, cylinders, horsepower, torque, transmission, drivetrain]
      properties:
        engineSize:
          type: string
          nullable: true
        engineType:
          type: string
          nullable: true
        fuelType:
          type: string
          nullable: true
        cylinders:
          type: integer
          nullable: true
        horsepower:
          type: string
          nullable: true
        torque:
          type: string
          nullable: true
        transmission:
          type: string
          nullable: true
        drivetrain:
          type: string
          nullable: true

    VehicleEfficiency:
      type: object
      required: [cityMpg, highwayMpg, combinedMpg, mpge, electricRangeMiles, batteryCapacityKwh, chargingType]
      properties:
        cityMpg:
          type: number
          nullable: true
        highwayMpg:
          type: number
          nullable: true
        combinedMpg:
          type: number
          nullable: true
        mpge:
          type: number
          nullable: true
        electricRangeMiles:
          type: integer
          nullable: true
        batteryCapacityKwh:
          type: number
          nullable: true
        chargingType:
          type: string
          nullable: true

    VehicleConditionHistory:
      type: object
      required: [titleStatus, accidentHistory, ownersCount, serviceRecordsCount, openRecalls, inspectionCompleted, inspectionSummaryUrl, frameDamageReported]
      properties:
        titleStatus:
          type: string
          nullable: true
        accidentHistory:
          type: string
          nullable: true
        ownersCount:
          type: integer
          nullable: true
        serviceRecordsCount:
          type: integer
          nullable: true
        openRecalls:
          type: integer
          nullable: true
        inspectionCompleted:
          type: boolean
        inspectionSummaryUrl:
          type: string
          nullable: true
        frameDamageReported:
          type: boolean

    VehicleFeatureCategories:
      type: object
      required: [comfort, technology, safety, exterior, performance, utility, entertainment, other]
      properties:
        comfort:
          type: array
          items: { type: string }
        technology:
          type: array
          items: { type: string }
        safety:
          type: array
          items: { type: string }
        exterior:
          type: array
          items: { type: string }
        performance:
          type: array
          items: { type: string }
        utility:
          type: array
          items: { type: string }
        entertainment:
          type: array
          items: { type: string }
        other:
          type: array
          items: { type: string }

    VehicleFeatures:
      type: object
      required: [highlights, categories]
      properties:
        highlights:
          type: array
          items: { type: string }
        categories:
          $ref: '#/components/schemas/VehicleFeatureCategories'

    VehicleWarranty:
      type: object
      required: [factoryWarrantyRemaining, warrantyDescription, certifiedProgramName, returnPolicyDays, protectionPlansAvailable]
      properties:
        factoryWarrantyRemaining:
          type: string
          nullable: true
        warrantyDescription:
          type: string
          nullable: true
        certifiedProgramName:
          type: string
          nullable: true
        returnPolicyDays:
          type: integer
          nullable: true
        protectionPlansAvailable:
          type: boolean

    VehicleMedia:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceMediaItem'
        tour:
          $ref: '#/components/schemas/VehicleMediaTour'
          nullable: true

    MarketplaceMediaItem:
      type: object
      description: Full media item for detail gallery (extended kinds, slots, tour refs).
      required: [id, kind, url, sortOrder, slot, angle, caption, posterUrl, mimeType, width, height, durationSec, embedUrl]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [IMAGE, VIDEO, SPIN_360, DOORS_OPEN]
        url:
          type: string
        sortOrder:
          type: integer
        slot:
          type: string
          nullable: true
          enum: [HERO, SLOT_2, SLOT_3, SLOT_4, SLOT_5, SLOT_6, SLOT_7, SLOT_8, SLOT_9, SLOT_10, SLOT_11, SLOT_12, SLOT_13, SLOT_14, SLOT_15, SLOT_16, SLOT_17, SLOT_18, SLOT_19, SLOT_20, SLOT_21, SLOT_22, SLOT_23, SLOT_24, SLOT_25, OVERFLOW]
        angle:
          type: string
          nullable: true
          enum: [EXTERIOR_FRONT_34, EXTERIOR_FRONT, EXTERIOR_REAR_34, EXTERIOR_REAR, EXTERIOR_SIDE, EXTERIOR_DOORS_OPEN, INTERIOR_FRONT, INTERIOR_REAR, INTERIOR_DASH, INTERIOR_CARGO, DETAIL, CONDITION]
        caption:
          type: string
          nullable: true
        posterUrl:
          type: string
          nullable: true
        mimeType:
          type: string
          nullable: true
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        durationSec:
          type: number
          nullable: true
        embedUrl:
          type: string
          nullable: true

    VehicleMediaTour:
      type: object
      required: [enabled, title, steps]
      properties:
        enabled:
          type: boolean
        title:
          type: string
          nullable: true
        steps:
          type: array
          items:
            $ref: '#/components/schemas/VehicleTourStep'

    VehicleTourStep:
      type: object
      required: [mediaId, label, stepType, note, sortOrder]
      properties:
        mediaId:
          type: string
        label:
          type: string
        stepType:
          type: string
          enum: [HIGHLIGHT, ISSUE, NEUTRAL]
        note:
          type: string
          nullable: true
        sortOrder:
          type: integer

    VehicleContent:
      type: object
      required: [fullDescription, dealerNotes, disclaimer, legalDisclosure]
      properties:
        fullDescription:
          type: string
          nullable: true
        dealerNotes:
          type: string
          nullable: true
        disclaimer:
          type: string
          nullable: true
        legalDisclosure:
          type: string
          nullable: true

    MarketplaceListingPromotion:
      type: object
      description: |
        Platform syndication context — required on every detail response.
        Operator/context data first; not default consumer-visible VDP content.
      required: [platformListingId, channels, syndicationStatus, lastSyncedAt, primaryChannelSlug]
      properties:
        platformListingId:
          type: string
        channels:
          type: array
          items:
            $ref: '#/components/schemas/PromotionChannel'
        syndicationStatus:
          type: string
          enum: [DRAFT, LIVE, PAUSED, ERROR]
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
        primaryChannelSlug:
          type: string
          nullable: true

    PromotionChannel:
      type: object
      required: [slug, label, status, liveUrl]
      properties:
        slug:
          type: string
        label:
          type: string
        status:
          type: string
          enum: [ACTIVE, PENDING, BLOCKED, OFF]
        liveUrl:
          type: string
          nullable: true

    MarketplaceVehicleCtas:
      type: object
      required: [primary, secondary]
      properties:
        primary:
          $ref: '#/components/schemas/MarketplaceVehicleCtaPrimary'
        secondary:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceVehicleCtaSecondary'

    MarketplaceVehicleCtaPrimary:
      type: object
      required: [action, label]
      properties:
        action:
          type: string
          enum: [INQUIRY, PHONE, EXTERNAL_URL]
        label:
          type: string

    MarketplaceVehicleCtaSecondary:
      type: object
      required: [action, label, href]
      properties:
        action:
          type: string
          enum: [DEALER_PAGE, DEALER_INVENTORY, EXTERNAL_URL]
        label:
          type: string
        href:
          type: string
          nullable: true

    MarketplaceFacetOption:
      type: object
      required: [value, count]
      properties:
        value:
          type: string
        count:
          type: integer
          minimum: 0

    MarketplaceFacetRange:
      type: object
      required: [value, count]
      properties:
        value:
          type: string
        count:
          type: integer
          minimum: 0
        label:
          type: string
        min:
          type: integer
          nullable: true
        max:
          type: integer
          nullable: true


    MarketplaceFacetsResponse:
      type: object
      required: [priceRanges, yearRanges, mileageRanges]
      properties:
        brandFacets:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceFacetOption'
        modelFacets:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceFacetOption'
        customFacets:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/MarketplaceFacetOption'
        priceRanges:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceFacetRange'
        yearRanges:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceFacetRange'
        mileageRanges:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceFacetRange'

    MarketplaceFeedResponse:
      type: object
      required: [items, nextCursor, totalEstimate, appliedFilters]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceFeedItem'
        nextCursor:
          type: string
          nullable: true
        totalEstimate:
          type: integer
          minimum: 0
        appliedFilters:
          $ref: '#/components/schemas/MarketplaceFeedAppliedFilters'

    MarketplaceFeedAppliedFilters:
      type: object
      required: [make, model, condition, minPrice, maxPrice, maxMileage, dealer, availability]
      properties:
        make:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        condition:
          type: string
          nullable: true
          enum: [NEW, USED, CPO]
        minPrice:
          type: integer
          nullable: true
          minimum: 0
        maxPrice:
          type: integer
          nullable: true
          minimum: 0
        maxMileage:
          type: integer
          nullable: true
          minimum: 0
        dealer:
          type: string
          nullable: true
        q:
          type: string
          nullable: true
        availability:
          type: string
          enum: [available]

    MarketplaceFeedItem:
      oneOf:
        - $ref: '#/components/schemas/MarketplaceVehicleFeedItem'
        - $ref: '#/components/schemas/MarketplaceDealerPromoFeedItem'
        - $ref: '#/components/schemas/MarketplaceNoticeFeedItem'
      discriminator:
        propertyName: type
        mapping:
          vehicle: '#/components/schemas/MarketplaceVehicleFeedItem'
          dealerPromo: '#/components/schemas/MarketplaceDealerPromoFeedItem'
          marketplaceNotice: '#/components/schemas/MarketplaceNoticeFeedItem'

    MarketplaceVehicleFeedItem:
      type: object
      required: [type, id, impressionKey, vehicle]
      properties:
        type:
          type: string
          enum: [vehicle]
        id:
          type: string
        impressionKey:
          type: string
        vehicle:
          $ref: '#/components/schemas/MarketplaceVehicleCard'

    MarketplaceDealerPromoFeedItem:
      type: object
      required: [type, id, impressionKey, promo]
      properties:
        type:
          type: string
          enum: [dealerPromo]
        id:
          type: string
        impressionKey:
          type: string
        promo:
          $ref: '#/components/schemas/MarketplaceDealerPromo'

    MarketplaceDealerPromo:
      type: object
      required: [title, body, dealerName, dealerId, ctaLabel, ctaHref, mediaUrl]
      properties:
        title:
          type: string
        body:
          type: string
        dealerName:
          type: string
        dealerId:
          type: string
        ctaLabel:
          type: string
        ctaHref:
          type: string
        mediaUrl:
          type: string
          nullable: true

    MarketplaceNoticeFeedItem:
      type: object
      required: [type, id, impressionKey, notice]
      properties:
        type:
          type: string
          enum: [marketplaceNotice]
        id:
          type: string
        impressionKey:
          type: string
        notice:
          $ref: '#/components/schemas/MarketplaceNotice'

    MarketplaceNotice:
      type: object
      required: [title, body, tone]
      properties:
        title:
          type: string
        body:
          type: string
        tone:
          type: string
          enum: [info]

    MarketplaceLeadCaptureRequest:
      type: object
      additionalProperties: false
      description: Basic shopper contact fields. At least one contact field is required.
      properties:
        contactName:
          type: string
          maxLength: 160
        contactEmail:
          type: string
          format: email
          maxLength: 255
        contactPhone:
          type: string
          maxLength: 40
        message:
          type: string
          maxLength: 5000

    MarketplaceLeadCaptureResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        leadId:
          type: string
          nullable: true

    MarketplaceListingReportRequest:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason:
          type: string
          enum:
            - PRICE_MISMATCH
            - SOLD_OR_UNAVAILABLE
            - SUSPECTED_FRAUD
            - INACCURATE_DESCRIPTION
            - INAPPROPRIATE_CONTENT
            - OTHER
        details:
          type: string
          maxLength: 1000
          description: Optional additional context from the reporter.

    MarketplaceListingReportResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        reportId:
          type: string
          nullable: true

    MarketplaceChannelEventRequest:
      type: object
      additionalProperties: false
      required: [eventType]
      properties:
        eventType:
          type: string
          enum: [vehicle_impression, vehicle_detail_view, dealer_page_view]
        listingId:
          type: string
          maxLength: 80
          description: Required for vehicle_impression and vehicle_detail_view.
        dealerId:
          type: string
          maxLength: 80
          description: Required for dealer_page_view.
        category:
          type: string
          maxLength: 80
          description: Optional business category boundary for the event.

    MarketplaceChannelEventResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: boolean

    MarketplaceCategoryItemCard:
      type: object
      description: Consumer-safe category item card for browse lists (e-books, digital items).
      required:
        - listingId
        - categoryId
        - stockNumber
        - title
        - priceCents
        - mediaUrls
        - dealerId
        - dealerName
        - listingUrl
        - listedAt
      properties:
        listingId:
          type: string
          description: Opaque stable identifier for the detail route.
        categoryId:
          type: string
          description: Business category enum (e.g. EBOOKS).
        stockNumber:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
        priceCents:
          type: integer
          minimum: 0
        mediaUrls:
          type: array
          items:
            type: string
        dealerId:
          type: string
        dealerName:
          type: string
        dealerCity:
          type: string
          nullable: true
        dealerState:
          type: string
          nullable: true
        listingUrl:
          type: string
        listedAt:
          type: string
          format: date-time

    MarketplaceCategoryItemDetail:
      allOf:
        - $ref: '#/components/schemas/MarketplaceCategoryItemCard'
        - type: object
          properties:
            publisher:
              type: string
              nullable: true
            language:
              type: string
              nullable: true
            pageCount:
              type: integer
              nullable: true
            isbn:
              type: string
              nullable: true
            asin:
              type: string
              nullable: true
            data:
              type: object
              additionalProperties: true

    MarketplaceCategoryItemListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceCategoryItemCard'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1

    MarketplaceDealerIndexResponse:
      type: object
      required: [dealerId, dealerName, dealerCity, dealerState, websiteUrl, vehicles]
      properties:
        dealerId:
          type: string
        dealerName:
          type: string
        dealerCity:
          type: string
          nullable: true
        dealerState:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        vehicles:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceVehicleCard'
          description: All marketplace-eligible vehicles for this dealer.

    MarketplaceDealerStatsResponse:
      type: object
      description: |
        Aggregated first-party engagement counts for one dealer's consumer-marketplace channel.
        All values are totals; no individual visitor data is included.
      required: [dealerId, vehicleDetailViews, dealerPageViews, inquirySubmissions]
      properties:
        dealerId:
          type: string
        vehicleDetailViews:
          type: integer
          minimum: 0
          description: Total vehicle detail page views.
        dealerPageViews:
          type: integer
          minimum: 0
          description: Total dealer storefront page views.
        inquirySubmissions:
          type: integer
          minimum: 0
          description: Total inquiry form submissions.
