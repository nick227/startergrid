  /api/dealers/{dealershipId}/reports/channel-velocity:
    get:
      tags: [Reports]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getChannelVelocityReport
      summary: Channel velocity and outcomes report
      description: |
        Median observed days from first channel send to sold/removed outcome for assets exiting in range.
        Not sales attribution — observed time-to-outcome only.
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/reportRange'
      responses:
        '200':
          description: Channel velocity report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelVelocityReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/dashboard:
    get:
      tags: [Admin]
      security:
        - OperatorAuth: []
      x-route-classification: admin
      operationId: getAdminDashboard
      summary: Retrieve the consolidated system administration overview dashboard (SUPER_ADMIN only)
      responses:
        '200':
          description: Consolidated dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/blocked-dealers:
    get:
      tags: [Admin]
      security:
        - OperatorAuth: []
      x-route-classification: admin
      operationId: getBlockedDealers
      summary: Retrieve the paginated and filterable blocked/attention-needed dealer configurations (SUPER_ADMIN only)
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: platform
          in: query
          required: false
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Filtered list of blocked dealers with pagination and summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBlockedDealersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/platform-credentials:
    get:
      tags: [Admin]
      security:
        - OperatorAuth: []
      x-route-classification: admin
      operationId: listPlatformCredentials
      summary: List developer API credential configuration per OAuth provider (SUPER_ADMIN only)
      responses:
        '200':
          description: Credential configuration summary per provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformCredentialListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/platform-credentials/validate:
    post:
      tags: [Admin]
      security:
        - OperatorAuth: []
      x-route-classification: admin
      operationId: validatePlatformCredentials
      summary: Live-validate developer API credentials against each provider's token endpoint (SUPER_ADMIN only)
      responses:
        '200':
          description: Validation outcome per provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformCredentialValidationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    OperatorAuth:
      type: apiKey
      in: cookie
      name: op_session
      description: |
        Operator session cookie issued by POST /api/auth/login (8-hour lifetime, HttpOnly, Secure in production).
        In development/test the Fastify guard also accepts an x-operator-id request header as a fallback;
        that path is never active when NODE_ENV=production.
    CookieAuth:
      type: apiKey
      in: cookie
      name: op_session
      description: HttpOnly session cookie issued by POST /api/auth/login. Secure flag set in production.

  parameters:
    dealershipId:
      name: dealershipId
      in: path
      required: true
      schema:
        type: string
    platformSlug:
      name: platformSlug
      in: path
      required: true
      schema:
        type: string
    stockNumber:
      name: stockNumber
      in: path
      required: true
      schema:
        type: string
    vehicleId:
      name: vehicleId
      in: path
      required: true
      schema:
        type: string
    mediaId:
      name: mediaId
      in: path
      required: true
      schema:
        type: string
    sourceId:
      name: sourceId
      in: path
      required: true
      schema:
        type: string
    reportRange:
      name: range
      in: query
      required: false
      description: Report window preset. Defaults to 7d when omitted or invalid.
      schema:
        type: string
        enum: [7d, 30d, 90d]
        default: 7d

  responses:
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Operator authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Operator does not have access to this dealership
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ProviderCredentialSummary:
      type: object
      required: [provider, platformSlugs, envVars, configured, probeSupported]
      properties:
        provider:
          type: string
          description: OAuth provider key (one developer app may serve multiple platform slugs)
        platformSlugs:
          type: array
          items:
            type: string
        envVars:
          type: array
          items:
            type: string
          description: Environment variable names holding the credentials (names only, never values)
        configured:
          type: boolean
        probeSupported:
          type: boolean
          description: Whether a live token-endpoint probe is available for this provider

    ProviderCredentialResult:
      allOf:
        - $ref: '#/components/schemas/ProviderCredentialSummary'
        - type: object
          required: [status, checkMethod, detail]
          properties:
            status:
              type: string
              enum: [valid, invalid, unknown, unreachable, not-configured, unsupported]
            checkMethod:
              type: string
              enum: [app-token, client-auth-inference, none]
              description: >
                app-token = fully validated; client-auth-inference = client authentication
                inferred from the provider's grant rejection (not a full key validation);
                none = no live check performed.
            detail:
              type: string
              description: Sanitized summary — never contains raw provider response bodies or secrets

    PlatformCredentialListResponse:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ProviderCredentialSummary'

    CredentialValidationMeta:
      type: object
      required: [lastCheckedAt, checkedBy, durationMs, cached]
      properties:
        lastCheckedAt:
          type: string
          format: date-time
        checkedBy:
          type: string
          description: Email of the operator who triggered the live run
        durationMs:
          type: integer
        cached:
          type: boolean
          description: True when served from the short-TTL cache instead of live probes

    PlatformCredentialValidationResponse:
      type: object
      required: [results, meta]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ProviderCredentialResult'
        meta:
          $ref: '#/components/schemas/CredentialValidationMeta'

    SocialPageSummary:
      type: object
      required: [id, pageId, name, isSelected]
      properties:
        id:
          type: string
        pageId:
          type: string
        name:
          type: string
        pictureUrl:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        isSelected:
          type: boolean

    PostPreview:
      type: object
      required: [postText, listingUrl]
      properties:
        postText:
          type: string
        imageUrl:
          type: string
          nullable: true
        listingUrl:
          type: string

    SocialPost:
      type: object
      required: [id, platformSlug, postText, status, trigger, createdAt]
      properties:
        id:
          type: string
        vehicleId:
          type: string
          nullable: true
        externalPostId:
          type: string
          nullable: true
        externalUrl:
          type: string
          nullable: true
        postText:
          type: string
        status:
          type: string
          enum: [DRAFT, PUBLISHED, FAILED, DELETED]
        trigger:
          type: string
          enum: [MANUAL, AUTO, PREVIEW]
        source:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        errorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        pageAccount:
          nullable: true
          type: object
          properties:
            pageId:
              type: string
            name:
              type: string
            pictureUrl:
              type: string
              nullable: true

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    OperatorLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128

    OperatorIdentityResponse:
      type: object
      required: [id, email, role, dealerAccessIds]
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [SUPER_ADMIN, OPERATOR, DEALER_OPERATOR]
        dealerAccessIds:
          type: array
          items:
            type: string
          description: Dealership IDs the operator can access. Empty for SUPER_ADMIN (global access).

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      required: [ok, ts]
      properties:
        ok:
          type: boolean
        ts:
          type: string
          format: date-time

    IntegrationClass:
      type: string
      enum: [OWNED, FEEDABLE, ASSISTED, PARTNER_DEPENDENT]

    ReadinessColor:
      type: string
      enum: [GREEN, YELLOW, RED]

    PublishState:
      type: string
      enum:
        - Active
        - Ready
        - Scheduled
        - Needs Approval
        - Blocked
        - Packet Prepared
        - Partner Required
        - Failed

    NextRecommendedAction:
      type: string
      enum:
        - fix_blocked_vehicles
        - review_approvals
        - run_scheduler
        - resolve_partner_requirement
        - resolve_account_requirement
        - no_action

    ValidationIssue:
      type: object
      required: [path, message, severity]
      properties:
        path:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [FAIL, WARN]
        code:
          type: string

    PublishStateSummary:
      type: object
      required:
        - Active
        - Ready
        - Scheduled
        - Needs Approval
        - Blocked
        - Packet Prepared
        - Partner Required
        - Failed
      properties:
        Active:
          type: integer
          minimum: 0
        Ready:
          type: integer
          minimum: 0
        Scheduled:
          type: integer
          minimum: 0
        Needs Approval:
          type: integer
          minimum: 0
        Blocked:
          type: integer
          minimum: 0
        Packet Prepared:
          type: integer
          minimum: 0
        Partner Required:
          type: integer
          minimum: 0
        Failed:
          type: integer
          minimum: 0

    ReadinessSummary:
      type: object
      required: [green, yellow, red]
      properties:
        green:
          type: integer
          minimum: 0
        yellow:
          type: integer
          minimum: 0
        red:
          type: integer
          minimum: 0

    VehicleReadinessItem:
      type: object
      required: [stockNumber, label, issues]
      properties:
        stockNumber:
          type: string
        label:
          type: string
          enum: [ready, warning, blocked]
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'

    VehicleReadinessBlock:
      type: object
      required: [total, ready, warning, blocked, details]
      properties:
        total:
          type: integer
          minimum: 0
        ready:
          type: integer
          minimum: 0
        warning:
          type: integer
          minimum: 0
        blocked:
          type: integer
          minimum: 0
        details:
          type: array
          items:
            $ref: '#/components/schemas/VehicleReadinessItem'

    PlatformPublishResult:
      type: object
      required:
        - platformSlug
        - platformName
        - integrationClass
        - readiness
        - state
        - detail
        - scheduledFor
        - queueItemId
        - artifactPath
      properties:
        platformSlug:
          type: string
        platformName:
          type: string
        integrationClass:
          $ref: '#/components/schemas/IntegrationClass'
        readiness:
          $ref: '#/components/schemas/ReadinessColor'
        state:
          $ref: '#/components/schemas/PublishState'
        detail:
          type: string
        scheduledFor:
          type: string
          format: date-time
          nullable: true
        queueItemId:
          type: string
          nullable: true
        artifactPath:
          type: string
          nullable: true

    PublishStatusResponse:
      type: object
      required:
        - dealershipId
        - dealerName
        - preparedAt
        - vehicles
        - readinessSummary
        - platforms
        - summary
        - nextRecommendedAction
      properties:
        dealershipId:
          type: string
        dealerName:
          type: string
        preparedAt:
          type: string
          format: date-time
        vehicles:
          $ref: '#/components/schemas/VehicleReadinessBlock'
        readinessSummary:
          $ref: '#/components/schemas/ReadinessSummary'
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/PlatformPublishResult'
        summary:
          $ref: '#/components/schemas/PublishStateSummary'
        nextRecommendedAction:
          $ref: '#/components/schemas/NextRecommendedAction'

    PreparePublishRequest:
      type: object
      additionalProperties: false
      properties:
        dryRun:
          type: boolean
          default: true
        platforms:
          type: array
          maxItems: 18
          items:
            type: string
            minLength: 1
            maxLength: 80

    PreparePublishResult:
      allOf:
        - $ref: '#/components/schemas/PublishStatusResponse'
        - type: object
          required: [dryRun]
          properties:
            dryRun:
              type: boolean

    SyncEvent:
      type: object
      required:
        - id
        - dealershipId
        - vehicleId
        - platformSlug
        - kind
        - payload
        - syncRunId
        - createdAt
      properties:
        id:
          type: string
        dealershipId:
          type: string
        vehicleId:
          type: string
          nullable: true
        platformSlug:
          type: string
          nullable: true
        kind:
          type: string
        payload:
          type: object
          nullable: true
          additionalProperties: true
        syncRunId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    HistoryMeta:
      type: object
      required: [hasMore, nextCursor]
      properties:
        hasMore:
          type: boolean
        nextCursor:
          type: string
          nullable: true

    HistoryResponse:
      type: object
      required: [events, meta]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/SyncEvent'
        meta:
          $ref: '#/components/schemas/HistoryMeta'

    PublishPlatformAccountEntry:
      type: object
      required:
        - platformSlug
        - platformName
        - integrationClass
        - accountState
        - accountId
        - platformRepName
        - platformRepEmail
        - membershipStatus
        - nextAction
        - nextActionOwner
        - notes
        - applicationStatus
        - lastChecked
        - updatedAt
      properties:
        platformSlug:
          type: string
        platformName:
          type: string
        integrationClass:
          $ref: '#/components/schemas/IntegrationClass'
        accountState:
          type: string
        accountId:
          type: string
          nullable: true
        platformRepName:
          type: string
          nullable: true
        platformRepEmail:
          type: string
          nullable: true
        membershipStatus:
          type: string
          nullable: true
        nextAction:
          type: string
          nullable: true
        nextActionOwner:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        applicationStatus:
          type: string
          nullable: true
        lastChecked:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    PublishAccountsResponse:
      type: object
      required: [accounts]
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/PublishPlatformAccountEntry'

    QueueItemView:
      type: object
      required:
        - id
        - assetRef
        - assetTitle
        - assetId
        - platformSlug
        - platformName
        - integrationClass
        - triggerKind
        - status
        - policyMode
        - priority
        - scheduledFor
        - blockReason
        - approvalRequiredReason
        - holdReason
        - approvedBy
        - sentAt
        - attemptCount
        - nextAttemptAt
        - claimedBy
        - createdAt
      properties:
        id:
          type: string
        assetRef:
          type: string
          nullable: true
        assetTitle:
          type: string
          nullable: true
        assetId:
          type: string
          nullable: true
        platformSlug:
          type: string
        platformName:
          type: string
        integrationClass:
          $ref: '#/components/schemas/IntegrationClass'
        triggerKind:
          type: string
        status:
          type: string
        policyMode:
          type: string
        priority:
          type: integer
        scheduledFor:
          type: string
          format: date-time
          nullable: true
        blockReason:
          type: string
          nullable: true
        approvalRequiredReason:
          type: string
          nullable: true
        holdReason:
          type: string
          nullable: true
        approvedBy:
          type: string
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        attemptCount:
          type: integer
        nextAttemptAt:
          type: string
          format: date-time
          nullable: true
        claimedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    QueuePlatformAccountRef:
      type: object
      required: [platformSlug, platformName, state]
      properties:
        platformSlug:
          type: string
        platformName:
          type: string
        state:
          type: string

    QueueSummary:
      type: object
      required:
        - ready
        - scheduled
        - needsApproval
        - blocked
        - held
        - claimed
        - overdue
        - retryPending
        - sent
        - failed
      properties:
        ready:
          type: integer
        scheduled:
          type: integer
        needsApproval:
          type: integer
        blocked:
          type: integer
        held:
          type: integer
        claimed:
          type: integer
        overdue:
          type: integer
        retryPending:
          type: integer
        sent:
          type: integer
        failed:
          type: integer

    QueueView:
      type: object
      required:
        - dealershipId
        - dealerName
        - generatedAt
        - pending
        - terminal
        - overdue
        - retryPending
        - claimed
        - platformAccounts
        - summary
      properties:
        dealershipId:
          type: string
        dealerName:
          type: string
        generatedAt:
          type: string
          format: date-time
        pending:
          type: array
          items:
            $ref: '#/components/schemas/QueueItemView'
        terminal:
          type: array
          items:
            $ref: '#/components/schemas/QueueItemView'
        overdue:
          type: array
          items:
            $ref: '#/components/schemas/QueueItemView'
        retryPending:
          type: array
          items:
            $ref: '#/components/schemas/QueueItemView'
        claimed:
          type: array
          items:
            $ref: '#/components/schemas/QueueItemView'
        platformAccounts:
          type: array
          items:
            $ref: '#/components/schemas/QueuePlatformAccountRef'
        summary:
          $ref: '#/components/schemas/QueueSummary'

    BusinessCategory:
      type: string
      enum:
        - AUTOMOTIVE
        - SONGS
        - EBOOKS
        - WATCHES
        - SNEAKERS
        - COLLECTIBLES
        - APPAREL
        - VACATION_RENTALS
        - APARTMENTS
        - HOMES
        - COMMERCIAL_PROPERTY
        - BOATS
        - TRAILERS_POWERSPORTS_RV
        - HEAVY_EQUIPMENT
        - FURNITURE
        - VIDEO_DISTRIBUTION

    DealerSummary:
      type: object
      required: [id, legalName, dbaName, businessCategory, createdAt]
      properties:
        id:
          type: string
        legalName:
          type: string
        dbaName:
          type: string
          nullable: true
        businessCategory:
          $ref: '#/components/schemas/BusinessCategory'
        createdAt:
          type: string
          format: date-time

    DealerListResponse:
      type: object
      required: [dealers]
      properties:
        dealers:
          type: array
          items:
            $ref: '#/components/schemas/DealerSummary'

    PlatformAccountDetail:
      type: object
      required:
        - id
        - platformSlug
        - platformName
        - integrationClass
        - state
        - accountId
        - platformRepName
        - platformRepEmail
        - membershipStatus
        - nextAction
        - nextActionOwner
        - notes
        - lastChecked
        - createdAt
        - updatedAt
        - oauthConnected
        - oauthExpired
        - tier
        - partnerSignup
      properties:
        id:
          type: string
        platformSlug:
          type: string
        platformName:
          type: string
        integrationClass:
          type: string
        state:
          type: string
        accountId:
          type: string
          nullable: true
        platformRepName:
          type: string
          nullable: true
        platformRepEmail:
          type: string
          nullable: true
        membershipStatus:
          type: string
          nullable: true
        nextAction:
          type: string
          nullable: true
        nextActionOwner:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        lastChecked:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        oauthProvider:
          type: string
          nullable: true
          description: OAuth provider key for this platform, or null if not OAuth-connected
        oauthConnected:
          type: boolean
          description: Whether a live OAuth token exists for this dealership+provider pair
        oauthExpired:
          type: boolean
          description: Whether a token row exists but has passed its expiry (re-auth needed)
        tier:
          type: integer
          nullable: true
          description: Priority tier (1=highest) for onboarding urgency; null for infrastructure channels
        partnerSignup:
          nullable: true
          description: Partner application details for channels requiring an external signup
          type: object
          required: [applyUrl, estimatedDays, requirements, contactType]
          properties:
            applyUrl:
              type: string
            estimatedDays:
              type: string
            requirements:
              type: string
            contactType:
              type: string
              enum: [self-serve, rep-assisted]

    AccountStateSummary:
      type: object
      required: [total, active, needsSetup, pendingReview, blocked, partnerRequired]
      properties:
        total:
          type: integer
        active:
          type: integer
        needsSetup:
          type: integer
        pendingReview:
          type: integer
        blocked:
          type: integer
        partnerRequired:
          type: integer

    AccountsManagementResponse:
      type: object
      required: [accounts, summary]
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/PlatformAccountDetail'
        summary:
          $ref: '#/components/schemas/AccountStateSummary'

    AccountUpdatePayload:
      type: object
      additionalProperties: false
      properties:
        state:
          type: string
          enum: [ACCOUNT_NEEDED, CREDENTIALS_NEEDED, PENDING_REVIEW, ACTIVE, BLOCKED, PARTNER_REQUIRED, SUSPENDED]
        notes:
          type: string
          maxLength: 5000
        accountId:
          type: string
          maxLength: 120
        platformRepName:
          type: string
          maxLength: 160
        platformRepEmail:
          type: string
