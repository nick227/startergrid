openapi: 3.0.3
info:
  title: Auto Dealer Operator API
  version: 4.0.0
  description: |
    Contract for the operator publish console and dealer inventory APIs.
    Handlers are implemented in Fastify; this spec is the source for the generated web client.
servers:
  - url: /
    description: Same-origin (Vite proxy in dev)

tags:
  - name: Health
  - name: Dealers
  - name: Publish
  - name: Accounts
  - name: Inventory
  - name: Vehicles
  - name: Storefront
  - name: Performance

paths:
  /health:
    get:
      tags: [Health]
      security: []
      x-route-classification: public
      operationId: getHealth
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers:
    get:
      tags: [Dealers]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listDealers
      summary: List dealerships
      responses:
        '200':
          description: Dealer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/dealers/{dealershipId}/publish/prepare:
    post:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: preparePublish
      summary: Prepare publish (dry-run by default)
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreparePublishRequest'
      responses:
        '200':
          description: Prepare result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreparePublishResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/dealers/{dealershipId}/publish/status:
    get:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getPublishStatus
      summary: Publish readiness status (dry-run prepare)
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Status snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/publish/history:
    get:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getPublishHistory
      summary: Sync event history
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - name: platformSlug
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: before
          in: query
          description: Cursor sync event id
          schema:
            type: string
      responses:
        '200':
          description: History page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/publish/accounts:
    get:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getPublishAccounts
      summary: Platform account summary for publish console
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Account rows aligned to platform catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishAccountsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/publish/queue:
    get:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getPublishQueue
      summary: Publish queue view
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Queue buckets and summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueView'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/publish/auto-sync:
    get:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getAutoSyncStatus
      summary: Auto-sync daemon state for a dealer
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Current auto-sync phase and last run info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoSyncStatus'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/accounts:
    get:
      tags: [Accounts]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listAccounts
      summary: Platform accounts (management)
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Accounts with summary counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsManagementResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/accounts/{platformSlug}:
    patch:
      tags: [Accounts]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: updateAccount
      summary: Update platform account fields
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/platformSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdatePayload'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory:
    get:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listInventory
      summary: Inventory list with readiness and optional lifecycle scope
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - name: lifecycleScope
          in: query
          schema:
            type: string
            enum: [active, sold, removed, all]
            default: active
          description: Filter by lifecycle — active (default), sold, removed, or all
      responses:
        '200':
          description: Vehicles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/import/preview:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: previewInventoryImport
      summary: Import preview (no writes)
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryImportRequest'
      responses:
        '200':
          description: Preview rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportPreviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/import/commit:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: commitInventoryImport
      summary: Commit inventory import
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryImportRequest'
      responses:
        '200':
          description: Commit counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitImportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/ingest/json:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: ingestJsonInventory
      summary: Ingest vehicles from a structured JSON payload
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonInventoryIngestRequest'
      responses:
        '200':
          description: Ingest result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonIngestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/ingest/snapshot/commit:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: commitSnapshotRemovals
      summary: Commit feed-snapshot removals from a prior dry-run ingest
      description: >
        Applies REMOVED only for stock numbers that appeared as snapshotRemovedCandidates
        on the given ingressRunId. Does not infer sold — missing vehicles are marked removed
        with source feed_snapshot and note "Missing from latest feed".
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotRemovalCommitRequest'
      responses:
        '200':
          description: Commit result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotRemovalCommitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/lifecycle-events:
    get:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listVehicleLifecycleEvents
      summary: Lifecycle audit trail for sold, removed, and relisted transitions
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: stockNumber
          in: query
          schema:
            type: string
            maxLength: 80
      responses:
        '200':
          description: Recent lifecycle events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleLifecycleEventListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/bulk:
    patch:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: bulkEditInventory
      summary: Bulk field update
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkEditPayload'
      responses:
        '200':
          description: Update count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkEditResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/import/batches:
    get:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listImportBatches
      summary: Recent import batch events
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Batches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportBatchesResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/vehicles/{stockNumber}/price:
    patch:
      tags: [Vehicles]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: updateVehiclePrice
      summary: Update vehicle price
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/stockNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceUpdateRequest'
      responses:
        '200':
          description: Update propagation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleUpdateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/vehicles/{stockNumber}/photos:
    patch:
      tags: [Vehicles]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: updateVehiclePhotos
      summary: Replace vehicle photo URLs
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/stockNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhotoUpdateRequest'
      responses:
        '200':
          description: Update propagation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleUpdateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/vehicles/{stockNumber}/sold:
    post:
      tags: [Vehicles]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: markVehicleSold
      summary: Mark vehicle sold
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/stockNumber'
      responses:
        '200':
          description: Update propagation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleUpdateResult'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/vehicles/{stockNumber}/removed:
    post:
      tags: [Vehicles]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: markVehicleRemoved
      summary: Mark vehicle removed
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/stockNumber'
      responses:
        '200':
          description: Update propagation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleUpdateResult'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/ingress/sources:
    get:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listIngressSources
      summary: List inventory ingress sources for a dealer
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Ingress sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngressSourcesResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: createIngressSource
      summary: Register an API inventory source
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIngressSourceRequest'
      responses:
        '200':
          description: Created source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngressSourceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/ingress/sources/{sourceId}:
    patch:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: updateIngressSource
      summary: Update label, status, or feed URL of an ingress source
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/sourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIngressSourceRequest'
      responses:
        '200':
          description: Updated source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngressSourceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/ingress/sources/{sourceId}/check:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: checkIngressSource
      summary: Fetch the source's feedUrl and ingest returned vehicles
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/sourceId'
      responses:
        '200':
          description: Check result with ingest counts or error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceCheckResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/ingress/runs:
    get:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listIngressRuns
      summary: List ingress runs for a dealer
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: before
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Ingress runs with pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngressRunsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/storefront:
    get:
      tags: [Storefront]
      security: []
      x-route-classification: public
      operationId: getStorefront
      summary: Public storefront payload
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Storefront
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/vehicles/{stockNumber}:
    get:
      tags: [Storefront]
      security: []
      x-route-classification: public
      operationId: getVehicleDetail
      summary: Vehicle listing detail
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/stockNumber'
      responses:
        '200':
          description: Listing
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/leads:
    post:
      tags: [Storefront]
      security: []
      x-route-classification: public-write
      operationId: captureLead
      summary: Capture storefront lead
      description: Public write endpoint protected by server-side rate limiting and abuse controls.
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadCaptureRequest'
      responses:
        '201':
          description: Lead accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadCaptureResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/performance/vehicles:
    get:
      tags: [Performance]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listVehiclePerformance
      summary: Vehicle movement signals from cache
      description: |
        Returns cached movement signal and comparable benchmark for every active vehicle.
        Reads from VehiclePerformanceCache only — no live computation.
        Run POST /performance/compute first if the response is empty.
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Vehicle performance list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehiclePerformanceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/performance/vehicles/{stockNumber}:
    get:
      tags: [Performance]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getVehiclePerformance
      summary: Single vehicle movement signal from cache
      description: |
        Returns cached performance data for one vehicle by stock number.
        Returns 404 when the vehicle has not yet been computed.
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/stockNumber'
      responses:
        '200':
          description: Vehicle performance detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehiclePerformanceDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/performance/platforms:
    get:
      tags: [Performance]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listPlatformPerformance
      summary: Per-platform observed assist data from cache
      description: |
        Returns average days-to-move, lead counts, and confidence for every platform
        that has SUBMISSION_SENT events. Uses "observed assist" framing — not attribution.
        Reads from PlatformPerformanceSummary cache only.
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Platform performance list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformPerformanceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/performance/summary:
    get:
      tags: [Performance]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getPerformanceSummary
      summary: Top movers, stale risks, and best observed platform from cache
      description: |
        Aggregated overview: fast movers (up to 5), stale risks (up to 5),
        signal counts, and the best observed platform (lowest avg days to move
        with confidence ≥ LOW). Cache-only read.
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Performance summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/performance/compute:
    post:
      tags: [Performance]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: computePerformance
      summary: Trigger manual performance cache recomputation
      description: |
        Runs vehicle and platform aggregate jobs for the dealer and upserts cache tables.
        Idempotent — safe to run multiple times. vehicleErrors > 0 indicates
        partial failures; check server logs for details.
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Compute result with counts and duration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceComputeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    OperatorAuth:
      type: http
      scheme: bearer
      bearerFormat: dev-placeholder
      description: Operator auth placeholder. In development, the Fastify guard also accepts x-operator-id or DEV_OPERATOR_ID.

  parameters:
    dealershipId:
      name: dealershipId
      in: path
      required: true
      schema:
        type: string
    platformSlug:
      name: platformSlug
      in: path
      required: true
      schema:
        type: string
    stockNumber:
      name: stockNumber
      in: path
      required: true
      schema:
        type: string
    sourceId:
      name: sourceId
      in: path
      required: true
      schema:
        type: string

  responses:
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Operator authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Operator does not have access to this dealership
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      required: [ok, ts]
      properties:
        ok:
          type: boolean
        ts:
          type: string
          format: date-time

    IntegrationClass:
      type: string
      enum: [OWNED, FEEDABLE, ASSISTED, PARTNER_DEPENDENT]

    ReadinessColor:
      type: string
      enum: [GREEN, YELLOW, RED]

    PublishState:
      type: string
      enum:
        - Active
        - Ready
        - Scheduled
        - Needs Approval
        - Blocked
        - Packet Prepared
        - Partner Required
        - Failed

    NextRecommendedAction:
      type: string
      enum:
        - fix_blocked_vehicles
        - review_approvals
        - run_scheduler
        - resolve_partner_requirement
        - resolve_account_requirement
        - no_action

    ValidationIssue:
      type: object
      required: [path, message, severity]
      properties:
        path:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [FAIL, WARN]
        code:
          type: string

    PublishStateSummary:
      type: object
      required:
        - Active
        - Ready
        - Scheduled
        - Needs Approval
        - Blocked
        - Packet Prepared
        - Partner Required
        - Failed
      properties:
        Active:
          type: integer
          minimum: 0
        Ready:
          type: integer
          minimum: 0
        Scheduled:
          type: integer
          minimum: 0
        Needs Approval:
          type: integer
          minimum: 0
        Blocked:
          type: integer
          minimum: 0
        Packet Prepared:
          type: integer
          minimum: 0
        Partner Required:
          type: integer
          minimum: 0
        Failed:
          type: integer
          minimum: 0

    ReadinessSummary:
      type: object
      required: [green, yellow, red]
      properties:
        green:
          type: integer
          minimum: 0
        yellow:
          type: integer
          minimum: 0
        red:
          type: integer
          minimum: 0

    VehicleReadinessItem:
      type: object
      required: [stockNumber, label, issues]
      properties:
        stockNumber:
          type: string
        label:
          type: string
          enum: [ready, warning, blocked]
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'

    VehicleReadinessBlock:
      type: object
      required: [total, ready, warning, blocked, details]
      properties:
        total:
          type: integer
          minimum: 0
        ready:
          type: integer
          minimum: 0
        warning:
          type: integer
          minimum: 0
        blocked:
          type: integer
          minimum: 0
        details:
          type: array
          items:
            $ref: '#/components/schemas/VehicleReadinessItem'

    PlatformPublishResult:
      type: object
      required:
        - platformSlug
        - platformName
        - integrationClass
        - readiness
        - state
        - detail
        - scheduledFor
        - queueItemId
        - artifactPath
      properties:
        platformSlug:
          type: string
        platformName:
          type: string
        integrationClass:
          $ref: '#/components/schemas/IntegrationClass'
        readiness:
          $ref: '#/components/schemas/ReadinessColor'
        state:
          $ref: '#/components/schemas/PublishState'
        detail:
          type: string
        scheduledFor:
          type: string
          format: date-time
          nullable: true
        queueItemId:
          type: string
          nullable: true
        artifactPath:
          type: string
          nullable: true

    PublishStatusResponse:
      type: object
      required:
        - dealershipId
        - dealerName
        - preparedAt
        - vehicles
        - readinessSummary
        - platforms
        - summary
        - nextRecommendedAction
      properties:
        dealershipId:
          type: string
        dealerName:
          type: string
        preparedAt:
          type: string
          format: date-time
        vehicles:
          $ref: '#/components/schemas/VehicleReadinessBlock'
        readinessSummary:
          $ref: '#/components/schemas/ReadinessSummary'
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/PlatformPublishResult'
        summary:
          $ref: '#/components/schemas/PublishStateSummary'
        nextRecommendedAction:
          $ref: '#/components/schemas/NextRecommendedAction'

    PreparePublishRequest:
      type: object
      additionalProperties: false
      properties:
        dryRun:
          type: boolean
          default: true
        platforms:
          type: array
          maxItems: 18
          items:
            type: string
            minLength: 1
            maxLength: 80

    PreparePublishResult:
      allOf:
        - $ref: '#/components/schemas/PublishStatusResponse'
        - type: object
          required: [dryRun]
          properties:
            dryRun:
              type: boolean

    SyncEvent:
      type: object
      required:
        - id
        - dealershipId
        - vehicleId
        - platformSlug
        - kind
        - payload
        - syncRunId
        - createdAt
      properties:
        id:
          type: string
        dealershipId:
          type: string
        vehicleId:
          type: string
          nullable: true
        platformSlug:
          type: string
          nullable: true
        kind:
          type: string
        payload:
          type: object
          nullable: true
          additionalProperties: true
        syncRunId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    HistoryMeta:
      type: object
      required: [hasMore, nextCursor]
      properties:
        hasMore:
          type: boolean
        nextCursor:
          type: string
          nullable: true

    HistoryResponse:
      type: object
      required: [events, meta]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/SyncEvent'
        meta:
          $ref: '#/components/schemas/HistoryMeta'

    PublishPlatformAccountEntry:
      type: object
      required:
        - platformSlug
        - platformName
        - integrationClass
        - accountState
        - accountId
        - platformRepName
        - platformRepEmail
        - membershipStatus
        - nextAction
        - nextActionOwner
        - notes
        - applicationStatus
        - lastChecked
        - updatedAt
      properties:
        platformSlug:
          type: string
        platformName:
          type: string
        integrationClass:
          $ref: '#/components/schemas/IntegrationClass'
        accountState:
          type: string
        accountId:
          type: string
          nullable: true
        platformRepName:
          type: string
          nullable: true
        platformRepEmail:
          type: string
          nullable: true
        membershipStatus:
          type: string
          nullable: true
        nextAction:
          type: string
          nullable: true
        nextActionOwner:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        applicationStatus:
          type: string
          nullable: true
        lastChecked:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    PublishAccountsResponse:
      type: object
      required: [accounts]
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/PublishPlatformAccountEntry'

    QueueItemView:
      type: object
      required:
        - id
        - stockNumber
        - vehicleTitle
        - vehicleId
        - platformSlug
        - platformName
        - integrationClass
        - triggerKind
        - status
        - policyMode
        - priority
        - scheduledFor
        - blockReason
        - approvalRequiredReason
        - holdReason
        - approvedBy
        - sentAt
        - attemptCount
        - nextAttemptAt
        - claimedBy
        - createdAt
      properties:
        id:
          type: string
        stockNumber:
          type: string
          nullable: true
        vehicleTitle:
          type: string
          nullable: true
        vehicleId:
          type: string
          nullable: true
        platformSlug:
          type: string
        platformName:
          type: string
        integrationClass:
          $ref: '#/components/schemas/IntegrationClass'
        triggerKind:
          type: string
        status:
          type: string
        policyMode:
          type: string
        priority:
          type: integer
        scheduledFor:
          type: string
          format: date-time
          nullable: true
        blockReason:
          type: string
          nullable: true
        approvalRequiredReason:
          type: string
          nullable: true
        holdReason:
          type: string
          nullable: true
        approvedBy:
          type: string
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        attemptCount:
          type: integer
        nextAttemptAt:
          type: string
          format: date-time
          nullable: true
        claimedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    QueuePlatformAccountRef:
      type: object
      required: [platformSlug, platformName, state]
      properties:
        platformSlug:
          type: string
        platformName:
          type: string
        state:
          type: string

    QueueSummary:
      type: object
      required:
        - ready
        - scheduled
        - needsApproval
        - blocked
        - held
        - claimed
        - overdue
        - retryPending
        - sent
        - failed
      properties:
        ready:
          type: integer
        scheduled:
          type: integer
        needsApproval:
          type: integer
        blocked:
          type: integer
        held:
          type: integer
        claimed:
          type: integer
        overdue:
          type: integer
        retryPending:
          type: integer
        sent:
          type: integer
        failed:
          type: integer

    QueueView:
      type: object
      required:
        - dealershipId
        - dealerName
        - generatedAt
        - pending
        - terminal
        - overdue
        - retryPending
        - claimed
        - platformAccounts
        - summary
      properties:
        dealershipId:
          type: string
        dealerName:
          type: string
        generatedAt:
          type: string
          format: date-time
        pending:
          type: array
          items:
            $ref: '#/components/schemas/QueueItemView'
        terminal:
          type: array
          items:
            $ref: '#/components/schemas/QueueItemView'
        overdue:
          type: array
          items:
            $ref: '#/components/schemas/QueueItemView'
        retryPending:
          type: array
          items:
            $ref: '#/components/schemas/QueueItemView'
        claimed:
          type: array
          items:
            $ref: '#/components/schemas/QueueItemView'
        platformAccounts:
          type: array
          items:
            $ref: '#/components/schemas/QueuePlatformAccountRef'
        summary:
          $ref: '#/components/schemas/QueueSummary'

    DealerSummary:
      type: object
      required: [id, legalName, dbaName, createdAt]
      properties:
        id:
          type: string
        legalName:
          type: string
        dbaName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    DealerListResponse:
      type: object
      required: [dealers]
      properties:
        dealers:
          type: array
          items:
            $ref: '#/components/schemas/DealerSummary'

    PlatformAccountDetail:
      type: object
      required:
        - id
        - platformSlug
        - platformName
        - integrationClass
        - state
        - accountId
        - platformRepName
        - platformRepEmail
        - membershipStatus
        - nextAction
        - nextActionOwner
        - notes
        - lastChecked
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        platformSlug:
          type: string
        platformName:
          type: string
        integrationClass:
          type: string
        state:
          type: string
        accountId:
          type: string
          nullable: true
        platformRepName:
          type: string
          nullable: true
        platformRepEmail:
          type: string
          nullable: true
        membershipStatus:
          type: string
          nullable: true
        nextAction:
          type: string
          nullable: true
        nextActionOwner:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        lastChecked:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AccountStateSummary:
      type: object
      required: [total, active, needsSetup, pendingReview, blocked, partnerRequired]
      properties:
        total:
          type: integer
        active:
          type: integer
        needsSetup:
          type: integer
        pendingReview:
          type: integer
        blocked:
          type: integer
        partnerRequired:
          type: integer

    AccountsManagementResponse:
      type: object
      required: [accounts, summary]
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/PlatformAccountDetail'
        summary:
          $ref: '#/components/schemas/AccountStateSummary'

    AccountUpdatePayload:
      type: object
      additionalProperties: false
      properties:
        state:
          type: string
          enum: [ACCOUNT_NEEDED, CREDENTIALS_NEEDED, PENDING_REVIEW, ACTIVE, BLOCKED, PARTNER_REQUIRED, SUSPENDED]
        notes:
          type: string
          maxLength: 5000
        accountId:
          type: string
          maxLength: 120
        platformRepName:
          type: string
          maxLength: 160
        platformRepEmail:
          type: string
          format: email
          maxLength: 255
        membershipStatus:
          type: string
          maxLength: 80
        nextAction:
          type: string
          maxLength: 255
        nextActionOwner:
          type: string
          enum: [DEALER, OPERATOR, PLATFORM]
          nullable: true

    AccountUpdateResponse:
      type: object
      required: [account]
      properties:
        account:
          $ref: '#/components/schemas/PlatformAccountDetail'

    VehicleIssue:
      type: object
      required: [path, message, severity]
      properties:
        path:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [FAIL, WARN]

    VehicleListItem:
      type: object
      required:
        - id
        - stockNumber
        - vin
        - year
        - make
        - model
        - trim
        - mileage
        - priceCents
        - condition
        - exteriorColor
        - mediaCount
        - readiness
        - issues
        - updatedAt
      properties:
        id:
          type: string
        stockNumber:
          type: string
        vin:
          type: string
        year:
          type: integer
        make:
          type: string
        model:
          type: string
        trim:
          type: string
          nullable: true
        mileage:
          type: integer
        priceCents:
          type: integer
        condition:
          type: string
        exteriorColor:
          type: string
        mediaCount:
          type: integer
        readiness:
          type: string
          enum: [READY, BLOCKED, WARNING]
        issues:
          type: array
          items:
            $ref: '#/components/schemas/VehicleIssue'
        lifecycleState:
          type: string
          enum: [AVAILABLE, SOLD, REMOVED, REACTIVATED]
        soldAt:
          type: string
          format: date-time
          nullable: true
        removedAt:
          type: string
          format: date-time
          nullable: true
        reactivatedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time

    VehicleLifecycleCounts:
      type: object
      required: [active, sold, removed]
      properties:
        active:  { type: integer }
        sold:    { type: integer }
        removed: { type: integer }

    VehicleListSummary:
      type: object
      required: [total, ready, warning, blocked, lifecycle]
      properties:
        total:
          type: integer
        ready:
          type: integer
        warning:
          type: integer
        blocked:
          type: integer
        lifecycle:
          $ref: '#/components/schemas/VehicleLifecycleCounts'

    VehicleListResponse:
      type: object
      required: [vehicles, summary, lifecycleScope]
      properties:
        vehicles:
          type: array
          items:
            $ref: '#/components/schemas/VehicleListItem'
        summary:
          $ref: '#/components/schemas/VehicleListSummary'
        lifecycleScope:
          type: string
          enum: [active, sold, removed, all]

    InventoryImportRequest:
      type: object
      required: [rows]
      additionalProperties: false
      properties:
        rows:
          type: array
          maxItems: 2000
          items:
            type: object
            maxProperties: 200
            additionalProperties:
              type: string
              maxLength: 2000
        mapping:
          type: object
          additionalProperties:
            type: string
            maxLength: 80

    ImportPreviewRow:
      type: object
      required: [rowIndex, raw, mapped, action, issues, readiness]
      properties:
        rowIndex:
          type: integer
        raw:
          type: object
          additionalProperties:
            type: string
        mapped:
          type: object
          additionalProperties: true
        action:
          type: string
          enum: [CREATE, UPDATE, SKIP]
        issues:
          type: array
          items:
            $ref: '#/components/schemas/VehicleIssue'
        readiness:
          type: string
          enum: [READY, BLOCKED, WARNING]
        existing:
          type: object
          additionalProperties: true

    ImportPreviewResponse:
      type: object
      required: [rows, unmappedColumns, requiredUnmapped, summary, suggestedMapping]
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ImportPreviewRow'
        unmappedColumns:
          type: array
          items:
            type: string
        requiredUnmapped:
          type: array
          items:
            type: string
        summary:
          type: object
          additionalProperties: true
        suggestedMapping:
          type: object
          additionalProperties:
            type: string

    JsonVehicleInput:
      type: object
      required: [stockNumber, vin, year, make, model, mileage, priceCents, condition, exteriorColor]
      properties:
        stockNumber:   { type: string, maxLength: 80 }
        vin:           { type: string, maxLength: 17 }
        year:          { type: integer, minimum: 1900, maximum: 2100 }
        make:          { type: string, maxLength: 80 }
        model:         { type: string, maxLength: 80 }
        trim:          { type: string, maxLength: 80 }
        mileage:       { type: integer, minimum: 0, maximum: 2000000 }
        priceCents:    { type: integer, minimum: 1, maximum: 100000000 }
        condition:
          type: string
          enum: [NEW, USED, CPO]
        exteriorColor: { type: string, maxLength: 80 }
        interiorColor: { type: string, maxLength: 80 }
        bodyStyle:     { type: string, maxLength: 80 }
        drivetrain:    { type: string, maxLength: 80 }
        fuelType:      { type: string, maxLength: 80 }
        transmission:  { type: string, maxLength: 80 }
        photoUrls:
          type: array
          maxItems: 100
          items:
            type: string
            format: uri
        availability:
          type: string
          enum: [available, sold, removed]
          description: Optional per-row lifecycle hint from the feed
        statusChangedAt:
          type: string
          format: date-time
          description: When the feed reported this availability change

    JsonInventoryIngestRequest:
      type: object
      required: [vehicles]
      properties:
        sourceSlug:
          type: string
          maxLength: 80
        sourceLabel:
          type: string
          maxLength: 160
        mode:
          type: string
          enum: [upsert]
        snapshotMode:
          type: boolean
          description: >
            When true, compare active DB inventory to this feed and detect vehicles missing
            from the payload. Removals are never applied silently — use dryRun (default true)
            or commitSnapshotRemovals on a follow-up call.
        dryRun:
          type: boolean
          description: When snapshotMode is true, defaults to true — returns candidates only
        commitSnapshotRemovals:
          type: boolean
          description: >
            When snapshotMode is true and dryRun is false, apply REMOVED for missing vehicles.
            Prefer POST .../ingest/snapshot/commit for explicit operator confirmation.
        vehicles:
          type: array
          minItems: 1
          maxItems: 2000
          items:
            $ref: '#/components/schemas/JsonVehicleInput'

    JsonIngestResponse:
      type: object
      required: [status, ingressRunId, created, updated, skipped, blocked, errors, vehicleCount]
      properties:
        status:
          type: string
          enum: [COMMITTED, PARTIAL, FAILED]
        ingressRunId: { type: string }
        created:      { type: integer }
        updated:      { type: integer }
        skipped:      { type: integer }
        blocked:      { type: integer }
        errors:       { type: integer }
        vehicleCount: { type: integer }
        batchId:      { type: string }
        salesStatus:
          $ref: '#/components/schemas/SalesStatusReconcileResult'

    SnapshotRemovedCandidate:
      type: object
      required: [stockNumber, vehicleId, reason, label]
      properties:
        stockNumber: { type: string }
        vehicleId:   { type: string }
        reason:
          type: string
          enum: [missing_from_feed]
        label:
          type: string
          description: Operator-facing reason — not sold

    SalesStatusReconcileResult:
      type: object
      required: [sold, removed, reactivated, skipped, snapshotRemovedCandidates, snapshotRemovalsApplied, snapshotDryRun]
      properties:
        sold:       { type: integer }
        removed:    { type: integer }
        reactivated: { type: integer }
        skipped:    { type: integer }
        snapshotRemovedCandidates:
          type: array
          items:
            $ref: '#/components/schemas/SnapshotRemovedCandidate'
        snapshotRemovalsApplied: { type: integer }
        snapshotDryRun: { type: boolean }

    SnapshotRemovalCommitRequest:
      type: object
      required: [ingressRunId, stockNumbers]
      properties:
        ingressRunId: { type: string }
        stockNumbers:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: string
            maxLength: 80
        statusChangedAt:
          type: string
          format: date-time

    SnapshotRemovalCommitResponse:
      type: object
      required: [applied, skipped, rejected]
      properties:
        applied:  { type: integer }
        skipped:  { type: integer }
        rejected:
          type: array
          items:
            type: string

    VehicleLifecycleEvent:
      type: object
      required: [id, vehicleId, stockNumber, fromState, toState, triggerKind, source, statusChangedAt, createdAt]
      properties:
        id:              { type: string }
        vehicleId:       { type: string }
        stockNumber:     { type: string }
        fromState:
          type: string
          enum: [AVAILABLE, SOLD, REMOVED, REACTIVATED]
        toState:
          type: string
          enum: [AVAILABLE, SOLD, REMOVED, REACTIVATED]
        triggerKind:     { type: string }
        source:
          type: string
          enum: [manual, ingress_row, feed_snapshot]
        ingressRunId:    { type: string, nullable: true }
        statusChangedAt: { type: string, format: date-time }
        note:            { type: string, nullable: true }
        createdAt:       { type: string, format: date-time }

    VehicleLifecycleEventListResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/VehicleLifecycleEvent'

    CommitImportResponse:
      type: object
      required: [created, updated, skipped, errors, batchId, ingressRunId, status]
      properties:
        status:
          type: string
          enum: [COMMITTED, PARTIAL, FAILED]
        created:
          type: integer
        updated:
          type: integer
        skipped:
          type: integer
        errors:
          type: integer
        batchId:
          type: string
        ingressRunId:
          type: string

    ImportBatch:
      type: object
      required: [id, createdAt]
      additionalProperties: true
      properties:
