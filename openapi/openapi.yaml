openapi: 3.0.3
info:
  title: Auto Dealer Operator API
  version: 4.0.0
  description: |
    Contract for the operator publish console and dealer inventory APIs.
    Handlers are implemented in Fastify; this spec is the source for the generated web client.
servers:
  - url: /
    description: Same-origin (Vite proxy in dev)

tags:
  - name: Auth
  - name: Health
  - name: Dealers
  - name: Publish
  - name: Accounts
  - name: Inventory
  - name: Vehicles
  - name: Storefront
  - name: Performance
  - name: Admin

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      security: []
      x-route-classification: auth
      operationId: operatorLogin
      summary: Operator login — issues op_session HttpOnly cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperatorLoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorIdentityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      tags: [Auth]
      security: []
      x-route-classification: auth
      operationId: operatorLogout
      summary: Operator logout — revokes session and clears cookie
      responses:
        '200':
          description: Logged out (succeeds even when no session exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /api/auth/me:
    get:
      tags: [Auth]
      security:
        - CookieAuth: []
      x-route-classification: auth
      operationId: getOperatorMe
      summary: Get current operator identity
      responses:
        '200':
          description: Authenticated operator identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorIdentityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /health:
    get:
      tags: [Health]
      security: []
      x-route-classification: public
      operationId: getHealth
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers:
    get:
      tags: [Dealers]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listDealers
      summary: List dealerships
      responses:
        '200':
          description: Dealer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/dealers/{dealershipId}/publish/prepare:
    post:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: preparePublish
      summary: Prepare publish (dry-run by default)
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreparePublishRequest'
      responses:
        '200':
          description: Prepare result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreparePublishResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/dealers/{dealershipId}/publish/status:
    get:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getPublishStatus
      summary: Publish readiness status (dry-run prepare)
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Status snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/publish/history:
    get:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getPublishHistory
      summary: Sync event history
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - name: platformSlug
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: before
          in: query
          description: Cursor sync event id
          schema:
            type: string
      responses:
        '200':
          description: History page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/publish/accounts:
    get:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getPublishAccounts
      summary: Platform account summary for publish console
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Account rows aligned to platform catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishAccountsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/publish/queue:
    get:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getPublishQueue
      summary: Publish queue view
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Queue buckets and summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueView'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/publish/auto-sync:
    get:
      tags: [Publish]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getAutoSyncStatus
      summary: Auto-sync daemon state for a dealer
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Current auto-sync phase and last run info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoSyncStatus'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/accounts:
    get:
      tags: [Accounts]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listAccounts
      summary: Platform accounts (management)
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Accounts with summary counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsManagementResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/accounts/{platformSlug}:
    patch:
      tags: [Accounts]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: updateAccount
      summary: Update platform account fields
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/platformSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdatePayload'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/platforms/{platformSlug}/connect-url:
    get:
      tags: [Accounts]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getPlatformConnectUrl
      summary: Get OAuth authorization URL for a platform
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/platformSlug'
      responses:
        '200':
          description: Authorization URL and CSRF state token
          content:
            application/json:
              schema:
                type: object
                required: [authUrl, state]
                properties:
                  authUrl:
                    type: string
                    description: Redirect the user to this URL to begin OAuth authorization
                  state:
                    type: string
                    description: CSRF state token stored server-side
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/platforms/{platformSlug}/oauth-token:
    delete:
      tags: [Accounts]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: deletePlatformOAuthToken
      summary: Revoke stored OAuth token for a platform
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/platformSlug'
      responses:
        '204':
          description: Token deleted
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/dealers/{dealershipId}/platforms/{platformSlug}/pages:
    get:
      tags: [Social]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: getSocialPages
      summary: Sync and list connected social pages for a platform
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/platformSlug'
      responses:
        '200':
          description: List of connected pages (no access tokens exposed)
          content:
            application/json:
              schema:
                type: object
                required: [pages]
                properties:
                  pages:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialPageSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '402':
          description: OAuth not connected — reconnect first
        '502':
          description: Upstream Graph API error

  /api/dealers/{dealershipId}/platforms/{platformSlug}/pages/{pageId}/select:
    put:
      tags: [Social]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: selectSocialPage
      summary: Select a social page for this dealer
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/platformSlug'
        - name: pageId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated page list with new selection reflected
          content:
            application/json:
              schema:
                type: object
                required: [pages]
                properties:
                  pages:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialPageSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/platforms/{platformSlug}/posts/preview:
    post:
      tags: [Social]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: previewSocialPost
      summary: Preview generated post copy for a vehicle (no publish, no DB write)
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/platformSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vehicleId]
              properties:
                vehicleId:
                  type: string
      responses:
        '200':
          description: Preview of post text, image, listing URL, and selected page
          content:
            application/json:
              schema:
                type: object
                required: [preview]
                properties:
                  preview:
                    $ref: '#/components/schemas/PostPreview'
                  selectedPage:
                    nullable: true
                    $ref: '#/components/schemas/SocialPageSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/platforms/{platformSlug}/posts:
    post:
      tags: [Social]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: publishSocialPost
      summary: Publish a vehicle post to the selected social page
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/platformSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vehicleId]
              properties:
                vehicleId:
                  type: string
                trigger:
                  type: string
                  enum: [MANUAL, AUTO]
                  default: MANUAL
                source:
                  type: string
      responses:
        '201':
          description: Post published and stored
          content:
            application/json:
              schema:
                type: object
                required: [post]
                properties:
                  post:
                    $ref: '#/components/schemas/SocialPost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: No page selected — choose a page first
        '502':
          description: Upstream Graph API publish error
    get:
      tags: [Social]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listSocialPosts
      summary: List recent social posts for a dealer platform
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/platformSlug'
      responses:
        '200':
          description: List of recent posts, newest first
          content:
            application/json:
              schema:
                type: object
                required: [posts]
                properties:
                  posts:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialPost'

  /api/oauth/callback:
    get:
      tags: [Accounts]
      security: []
      x-route-classification: public
      operationId: oauthCallback
      summary: OAuth provider callback — exchanges authorization code for tokens
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: code
          in: query
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
        - name: error_description
          in: query
          schema:
            type: string
      responses:
        '200':
          description: HTML popup-close page (success or error)
          content:
            text/html:
              schema:
                type: string
        '400':
          description: HTML popup-close page (invalid state)
          content:
            text/html:
              schema:
                type: string

  /api/dealers/{dealershipId}/inventory:
    get:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listInventory
      summary: Inventory list with readiness and optional lifecycle scope
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - name: lifecycleScope
          in: query
          schema:
            type: string
            enum: [active, sold, removed, all]
            default: active
          description: Filter by lifecycle — active (default), sold, removed, or all
      responses:
        '200':
          description: Vehicles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/import/preview:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: previewInventoryImport
      summary: Import preview (no writes)
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryImportRequest'
      responses:
        '200':
          description: Preview rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportPreviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/import/commit:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: commitInventoryImport
      summary: Commit inventory import
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryImportRequest'
      responses:
        '200':
          description: Commit counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitImportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/ingest/json:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: ingestJsonInventory
      summary: Ingest vehicles from a structured JSON payload
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonInventoryIngestRequest'
      responses:
        '200':
          description: Ingest result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonIngestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/ingest/snapshot/commit:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: commitSnapshotRemovals
      summary: Commit feed-snapshot removals from a prior dry-run ingest
      description: >
        Applies REMOVED only for stock numbers that appeared as snapshotRemovedCandidates
        on the given ingressRunId. Does not infer sold — missing vehicles are marked removed
        with source feed_snapshot and note "Missing from latest feed".
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotRemovalCommitRequest'
      responses:
        '200':
          description: Commit result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotRemovalCommitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/lifecycle-events:
    get:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listVehicleLifecycleEvents
      summary: Lifecycle audit trail for sold, removed, and relisted transitions
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: stockNumber
          in: query
          schema:
            type: string
            maxLength: 80
      responses:
        '200':
          description: Recent lifecycle events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleLifecycleEventListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/bulk:
    patch:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: bulkEditInventory
      summary: Bulk field update
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkEditPayload'
      responses:
        '200':
          description: Update count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkEditResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/import/batches:
    get:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: listImportBatches
      summary: Recent import batch events
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      responses:
        '200':
          description: Batches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportBatchesResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/vehicles/{stockNumber}/price:
    patch:
      tags: [Vehicles]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: updateVehiclePrice
      summary: Update vehicle price
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/stockNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceUpdateRequest'
      responses:
        '200':
          description: Update propagation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleUpdateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/vehicles/{stockNumber}/photos:
    patch:
      tags: [Vehicles]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: updateVehiclePhotos
      summary: Replace vehicle photo URLs
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/stockNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhotoUpdateRequest'
      responses:
        '200':
          description: Update propagation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleUpdateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/vehicles/{stockNumber}/sold:
    post:
      tags: [Vehicles]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: markVehicleSold
      summary: Mark vehicle sold
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/stockNumber'
      responses:
        '200':
          description: Update propagation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleUpdateResult'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/vehicles/{stockNumber}/removed:
    post:
      tags: [Vehicles]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: markVehicleRemoved
      summary: Mark vehicle removed
      parameters:
        - $ref: '#/components/parameters/dealershipId'
        - $ref: '#/components/parameters/stockNumber'
      responses:
        '200':
          description: Update propagation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleUpdateResult'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealershipId}/inventory/automotive/decode-vin:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: decodeVin
      summary: Decode a VIN via NHTSA vPIC (or mock decoder)
      parameters:
        - $ref: '#/components/parameters/dealershipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vin]
              properties:
                vin:
                  type: string
      responses:
        '200':
          description: Decoded VIN data
          content:
            application/json:
              schema:
                type: object
                properties:
                  vin:         { type: string }
                  year:        { type: integer, nullable: true }
                  make:        { type: string, nullable: true }
                  model:       { type: string, nullable: true }
                  trim:        { type: string, nullable: true }
                  bodyStyle:   { type: string, nullable: true }
                  drivetrain:  { type: string, nullable: true }
                  fuelType:    { type: string, nullable: true }
                  transmission: { type: string, nullable: true }
                  engineDisplacement: { type: number, nullable: true }
                  cylinders:   { type: integer, nullable: true }
                  source:      { type: string }
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/dealers/{dealershipId}/inventory/automotive/vehicles:
    post:
      tags: [Inventory]
      security:
        - OperatorAuth: []
      x-route-classification: operator
      operationId: createVehicleFromVin
      summary: Create a vehicle shell from a decoded VIN
