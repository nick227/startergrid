    # ── Performance cache schemas ──────────────────────────────────────────────

    MovementSignal:
      type: string
      enum: [FAST, ON_TRACK, SLOW, STALE, LOW_DATA]
      description: >
        Compares daysOnline to the average for comparable vehicles (same make/model,
        year ±3, price ±5%). LOW_DATA means fewer than 3 comparable sold vehicles exist.

    PerformanceConfidence:
      type: string
      enum: [INSUFFICIENT, LOW, MEDIUM, HIGH]
      description: >
        Data quality level based on sold-vehicle sample size.
        INSUFFICIENT = 0–2, LOW = 3–9, MEDIUM = 10–29, HIGH = 30+.
        Used for both comparable vehicle benchmarks and platform performance summaries.

    VehiclePerformanceItem:
      type: object
      required:
        - vehicleId
        - stockNumber
        - year
        - make
        - model
        - condition
        - priceCents
        - daysOnline
        - firstListedAt
        - comparableCount
        - avgComparableDays
        - medianComparableDays
        - benchmarkConfidence
        - benchmarkLabel
        - movementSignal
        - platformAssists
        - computedAt
      properties:
        vehicleId:
          type: string
        stockNumber:
          type: string
        year:
          type: integer
        make:
          type: string
        model:
          type: string
        condition:
          type: string
        priceCents:
          type: integer
        daysOnline:
          type: integer
          minimum: 0
        firstListedAt:
          type: string
          format: date-time
        comparableCount:
          type: integer
          minimum: 0
          description: Number of sold comparable vehicles used as the benchmark sample.
        avgComparableDays:
          type: number
          nullable: true
          description: Average days-online for sold comparables. Null when comparableCount < 3.
        medianComparableDays:
          type: number
          nullable: true
          description: Median days-online for sold comparables. More robust than average; null when comparableCount < 1.
        benchmarkConfidence:
          $ref: '#/components/schemas/PerformanceConfidence'
          description: >
            Data quality of the comparable benchmark, derived from comparableCount.
            INSUFFICIENT = 0–2 sold comparables, LOW = 3–9, MEDIUM = 10–29, HIGH = 30+.
        benchmarkLabel:
          type: string
          description: >
            Human-readable benchmark quality: "not enough comparable data" |
            "limited comparable data" | "comparable benchmark" | "strong comparable benchmark".
            Derived from benchmarkConfidence. Never implies predictive power.
        movementSignal:
          $ref: '#/components/schemas/MovementSignal'
        platformAssists:
          type: object
          additionalProperties:
            type: object
            required: [leads]
            properties:
              leads:
                type: integer
                minimum: 0
          description: Observed lead counts by platform slug. Not sales attribution.
        computedAt:
          type: string
          format: date-time

    PlatformPerformanceItem:
      type: object
      required:
        - platformSlug
        - vehiclesListed
        - vehiclesSold
        - vehiclesRemoved
        - avgDaysToMove
        - medianDaysToMove
        - avgDaysOnPlatform
        - totalLeads
        - leadsPerVehicle
        - confidence
        - sampleSize
        - observedAssistLabel
        - channelMetrics
        - computedAt
      properties:
        platformSlug:
          type: string
        vehiclesListed:
          type: integer
          minimum: 0
          description: Active vehicles with open platform exposure (SUBMISSION_SENT and not sold/removed).
        vehiclesSold:
          type: integer
          minimum: 0
          description: Vehicles with soldAt set after platform submission.
        vehiclesRemoved:
          type: integer
          minimum: 0
          description: Vehicles removed from inventory while listed on this platform (exposure closed, not sold).
        avgDaysToMove:
          type: number
          nullable: true
          description: >
            Average days from first SUBMISSION_SENT to soldAt for sold vehicles.
            Not a causal claim — use observedAssistLabel for display.
        medianDaysToMove:
          type: number
          nullable: true
        avgDaysOnPlatform:
          type: number
          nullable: true
          description: Average days from first SUBMISSION_SENT to removedAt for removed (not sold) vehicles.
        totalLeads:
          type: integer
          minimum: 0
        leadsPerVehicle:
          type: number
          nullable: true
        confidence:
          $ref: '#/components/schemas/PerformanceConfidence'
        sampleSize:
          type: integer
          minimum: 0
          description: Number of sold vehicles used in the calculation.
        observedAssistLabel:
          type: string
          description: >
            "strong observed assist" | "possible assist" | "insufficient data".
            Never says "sold by". Derived from confidence.
        channelMetrics:
          $ref: '#/components/schemas/ChannelMetrics'
        computedAt:
          type: string
          format: date-time

    ChannelMetric:
      type: object
      required: [count, confidence]
      properties:
        count:
          type: integer
          minimum: 0
        confidence:
          type: string
          enum: [observed_first_party, platform_reported, manual_imported, unavailable]

    ChannelMetrics:
      type: object
      description: >
        Normalized channel engagement counts. Omitted metrics were not observed —
        never inferred as zero with unavailable confidence.
      properties:
        views:
          $ref: '#/components/schemas/ChannelMetric'
        detailViews:
          $ref: '#/components/schemas/ChannelMetric'
        inquiries:
          $ref: '#/components/schemas/ChannelMetric'
        reportedClicks:
          $ref: '#/components/schemas/ChannelMetric'
        reportedContacts:
          $ref: '#/components/schemas/ChannelMetric'

    PerformanceSummaryView:
      type: object
      required:
        - computedAt
        - activeCount
        - staleCount
        - fastCount
        - lowDataCount
        - topMovers
        - staleRisks
        - bestObservedPlatform
      properties:
        computedAt:
          type: string
          format: date-time
          nullable: true
          description: Null when no cache rows exist yet.
        activeCount:
          type: integer
          minimum: 0
        staleCount:
          type: integer
          minimum: 0
        fastCount:
          type: integer
          minimum: 0
        lowDataCount:
          type: integer
          minimum: 0
        topMovers:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/VehiclePerformanceItem'
        staleRisks:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/VehiclePerformanceItem'
        bestObservedPlatform:
          description: >
            Platform with the lowest avgDaysToMove among platforms with confidence ≥ LOW.
            Null (JSON null) when no eligible platforms exist; shape matches PlatformPerformanceItem.
          allOf:
            - $ref: '#/components/schemas/PlatformPerformanceItem'

    VehiclePerformanceListResponse:
      type: object
      required: [items, computedAt]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VehiclePerformanceItem'
        computedAt:
          type: string
          format: date-time
          nullable: true

    VehiclePerformanceDetailResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/VehiclePerformanceItem'

    PlatformPerformanceListResponse:
      type: object
      required: [platforms, computedAt]
      properties:
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/PlatformPerformanceItem'
        computedAt:
          type: string
          format: date-time
          nullable: true

    PerformanceSummaryResponse:
      type: object
      required: [summary]
      properties:
        summary:
          $ref: '#/components/schemas/PerformanceSummaryView'

    PerformanceComputeResponse:
      type: object
      required: [result]
      properties:
        result:
          type: object
          required: [vehicles, vehicleErrors, platforms, durationMs, computedAt]
          properties:
            vehicles:
              type: integer
              minimum: 0
              description: Number of vehicle cache rows successfully written.
            vehicleErrors:
              type: integer
              minimum: 0
              description: Number of vehicles that failed to cache. 0 means full success.
            platforms:
              type: integer
              minimum: 0
            durationMs:
              type: integer
              minimum: 0
            computedAt:
              type: string
              format: date-time

    AutoSyncStatus:
      type: object
      required: [phase, scheduledFullReconcile, lastCompletedAt, lastError, lastDispatched, performanceRefreshPending, performanceComputedAt]
      properties:
        phase:
          type: string
          enum: [idle, scheduled, running, failed]
        scheduledFullReconcile:
          type: boolean
        lastCompletedAt:
          type: string
          nullable: true
        lastError:
          type: string
          nullable: true
        lastDispatched:
          type: integer
          nullable: true
        performanceRefreshPending:
          type: boolean
        performanceComputedAt:
          type: string
          format: date-time
          nullable: true

    LeadCaptureRequest:
      type: object
      additionalProperties: false
      properties:
        stockNumber:
          type: string
          maxLength: 80
        contactName:
          type: string
          maxLength: 160
        contactEmail:
          type: string
          format: email
          maxLength: 255
        contactPhone:
          type: string
          maxLength: 40
        message:
          type: string
          maxLength: 5000
